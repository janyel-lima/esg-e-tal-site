<!DOCTYPE html>
<html lang="pt-BR" x-data="app()" :class="{ 'dark': darkMode }" x-init="init()">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESG e Tal Consultancy</title>
  <meta name="description"
    content="Consultoria ESG especializada em Meio Ambiente, Responsabilidade Social, Governança e Comunicação Estratégica.">
  <link rel="icon" href="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>tailwind = { config: { darkMode: 'class' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="main.js"></script>
  <!-- Firebase Compat SDK (carregado antes do admin.js) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <!-- Configuração Firebase — preencha firebase-config.js com suas credenciais -->
  <script src="firebase-config.js"></script>
  <!-- Admin Panel CMS — ativar com Ctrl + Shift + A -->
  <script src="admin.js" defer></script>
  <style>
    /* RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    [x-cloak] {
      display: none !important
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'DM Sans', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--txt);
      transition: background .3s, color .3s
    }

    /* TOKENS */
    :root {
      --green: #10B981;
      --green-d: #059669;
      --gold: #F59E0B;
      --blue: #3B82F6;
      --purple: #8B5CF6;
      --purple-d: #7C3AED;
      --navy: #0B1929;
      --navy3: #162D4A;
      --bg: #FAFAF8;
      --bg2: #F2EFE9;
      --bg3: #E8E4DC;
      --surf: #FFFFFF;
      --surf2: #F7F5F0;
      --bdr: rgba(14, 32, 53, .1);
      --txt: #0D1B2E;
      --txt2: #3A5170;
      --txt3: #6B8299;
      --sh: 0 2px 16px rgba(14, 32, 53, .08);
      --shl: 0 8px 40px rgba(14, 32, 53, .14);
      --rad: 1rem;
      --rads: .5rem;
      --nav-h: 68px;
      /* Fluid type scale */
      --xs: clamp(.68rem, .62rem + .28vw, .8rem);
      --sm: clamp(.8rem, .74rem + .3vw, .9rem);
      --base: clamp(.875rem, .82rem + .27vw, 1rem);
      --md: clamp(1rem, .92rem + .4vw, 1.125rem);
      --lg: clamp(1.1rem, 1rem + .55vw, 1.3rem);
      --xl: clamp(1.2rem, 1.05rem + .85vw, 1.6rem);
      --2xl: clamp(1.45rem, 1.1rem + 1.6vw, 2.1rem);
      --3xl: clamp(1.8rem, 1.3rem + 2.5vw, 2.875rem);
      --4xl: clamp(2.2rem, 1.4rem + 4vw, 4rem);
      --hero: clamp(2.65rem, 1.4rem + 6.5vw, 6rem);
    }

    .dark {
      --bg: #08111C;
      --bg2: #0C1825;
      --bg3: #111F2E;
      --surf: #0F1E30;
      --surf2: #152840;
      --bdr: rgba(255, 255, 255, .07);
      --txt: #E4EDF6;
      --txt2: #94AECB;
      --txt3: #5F7A96;
      --sh: 0 2px 16px rgba(0, 0, 0, .35);
      --shl: 0 8px 40px rgba(0, 0, 0, .5);
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--navy3);
      border-radius: 99px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--green)
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-h);
      transition: background .35s, box-shadow .35s, border-color .35s;
      border-bottom: 1px solid transparent
    }

    /* Over dark hero */
    .navbar.is-top .nav-lnk {
      color: rgba(255, 255, 255, .72)
    }

    .navbar.is-top .nav-lnk:hover,
    .navbar.is-top .nav-lnk.active {
      color: #fff
    }

    .navbar.is-top .nav-lnk::after {
      background: #fff
    }

    .navbar.is-top .tbtn {
      border-color: rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .09);
      color: rgba(255, 255, 255, .8);
      backdrop-filter: blur(4px)
    }

    .navbar.is-top .tbtn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .14)
    }

    /* Scrolled */
    .navbar.is-scrolled {
      background: var(--bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--sh);
      border-bottom-color: var(--bdr)
    }

    .navbar.is-scrolled .nav-lnk {
      color: var(--txt2)
    }

    .navbar.is-scrolled .nav-lnk:hover,
    .navbar.is-scrolled .nav-lnk.active {
      color: var(--txt)
    }

    .navbar.is-scrolled .nav-lnk::after {
      background: var(--green)
    }

    .navbar.is-scrolled .tbtn {
      border-color: var(--bdr);
      background: var(--surf);
      color: var(--txt2)
    }

    .navbar.is-scrolled .tbtn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .05)
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      max-width: 1440px;
      margin: 0 auto;
      gap: clamp(.75rem, 2vw, 1.5rem)
    }

    /* Logo — no absolute positioning, use x-show for clean swap */
    .nav-logo {
      height: 38px;
      display: flex;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 0
    }

    .nav-logo img {
      height: 100%;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      display: block
    }

    /* Desktop links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(.625rem, 1.4vw, 1.75rem);
      flex: 1;
      justify-content: center;
      min-width: 0
    }

    .nav-lnk {
      font-size: var(--sm);
      font-weight: 500;
      cursor: pointer;
      position: relative;
      padding: .2rem 0;
      transition: color .25s;
      white-space: nowrap
    }

    .nav-lnk::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 2px;
      border-radius: 99px;
      transition: width .3s
    }

    .nav-lnk:hover::after,
    .nav-lnk.active::after {
      width: 100%
    }

    .nav-ctrl {
      display: flex;
      align-items: center;
      gap: .4rem;
      flex-shrink: 0
    }

    .tbtn {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .3rem .6rem;
      border-radius: 99px;
      border: 1.5px solid;
      font-size: var(--xs);
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      font-family: 'DM Sans', sans-serif;
      line-height: 1
    }

    /* Hide/show at breakpoint */
    @media(min-width:1100px) {
      .nav-burger {
        display: none !important
      }
    }

    @media(max-width:1099px) {
      .nav-links {
        display: none !important
      }
    }

    /* ── MOBILE MENU ── */
    .mm-ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .58);
      z-index: 140;
      backdrop-filter: blur(3px)
    }

    .mm-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(295px, 88vw);
      background: var(--surf);
      z-index: 150;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
      box-shadow: -12px 0 60px rgba(0, 0, 0, .28);
      overflow-y: auto
    }

    .mm-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--bdr)
    }

    .mm-lnk {
      display: block;
      padding: .7rem 1rem;
      border-radius: .5rem;
      color: var(--txt2);
      font-weight: 500;
      cursor: pointer;
      font-size: var(--md);
      transition: all .25s;
      border-left: 2px solid transparent
    }

    .mm-lnk:hover,
    .mm-lnk.active {
      background: rgba(16, 185, 129, .07);
      color: var(--green);
      border-left-color: var(--green);
      padding-left: 1.375rem
    }

    .mm-foot {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--bdr);
      display: flex;
      gap: .5rem
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center
    }

    .hero-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(4, 10, 20, .92) 0%, rgba(10, 24, 42, .8) 45%, rgba(4, 10, 20, .7) 100%);
      z-index: 1
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      z-index: 2;
      background-image: linear-gradient(rgba(16, 185, 129, .033) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, .033) 1px, transparent 1px);
      background-size: clamp(42px, 6vw, 70px) clamp(42px, 6vw, 70px);
      mask-image: radial-gradient(ellipse at 25% 50%, black 0%, transparent 72%)
    }

    .hero-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse 65% 70% at 80% 45%, rgba(16, 185, 129, .1) 0%, transparent 65%)
    }

    .hero-cnt {
      position: relative;
      z-index: 3;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
      padding: calc(var(--nav-h) + clamp(3rem, 7vh, 5.5rem)) clamp(1.25rem, 5vw, 4rem) clamp(3rem, 7vh, 4.5rem)
    }

    .hero-logo {
      height: clamp(34px, 4.5vw, 54px);
      width: auto;
      object-fit: contain;
      display: block;
      margin-bottom: clamp(1.5rem, 4vw, 2.75rem)
    }

    .hero-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--hero);
      font-weight: 700;
      color: #fff;
      line-height: 1.04;
      margin-bottom: clamp(1rem, 2.5vw, 1.75rem);
      letter-spacing: -.01em
    }

    .hero-hl .ac {
      color: var(--green)
    }

    .hero-sub {
      font-size: var(--md);
      color: rgba(255, 255, 255, .5);
      max-width: min(520px, 90%);
      margin-bottom: clamp(1.5rem, 4vw, 2.75rem);
      line-height: 1.9
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: clamp(2.5rem, 6vw, 4rem)
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(1.5rem, 4vw, 3rem);
      border-top: 1px solid rgba(255, 255, 255, .08);
      padding-top: clamp(1.25rem, 3vw, 2rem)
    }

    .stat-n {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: var(--green);
      line-height: 1
    }

    .stat-l {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .38);
      margin-top: .18rem
    }

    .scroll-cue {
      position: absolute;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      cursor: pointer;
      z-index: 3;
      opacity: .45;
      transition: opacity .25s
    }

    .scroll-cue:hover {
      opacity: .8
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: clamp(.6rem, 1.5vw, .875rem) clamp(1.1rem, 2.8vw, 1.875rem);
      border-radius: 99px;
      font-weight: 600;
      font-size: var(--sm);
      cursor: pointer;
      transition: all .3s;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      border: none;
      white-space: nowrap
    }

    .btn-g {
      background: var(--green);
      color: #fff
    }

    .btn-g:hover {
      background: var(--green-d);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(16, 185, 129, .38)
    }

    .btn-w {
      background: transparent;
      color: rgba(255, 255, 255, .78);
      border: 1.5px solid rgba(255, 255, 255, .22)
    }

    .btn-w:hover {
      border-color: rgba(255, 255, 255, .55);
      color: #fff;
      background: rgba(255, 255, 255, .06)
    }

    .btn-ghost {
      background: var(--surf);
      color: var(--txt);
      border: 1.5px solid var(--bdr)
    }

    .btn-ghost:hover {
      border-color: var(--green);
      color: var(--green)
    }

    .btn-purple {
      background: var(--purple);
      color: #fff
    }

    .btn-purple:hover {
      background: var(--purple-d);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139, 92, 246, .38)
    }

    /* ── SECTION SHARED ── */
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: clamp(3.5rem, 7vw, 6.5rem) clamp(1.25rem, 5vw, 4rem)
    }

    .sec-lbl {
      display: inline-block;
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: .55rem
    }

    .sec-h {
      font-family: 'Playfair Display', serif;
      font-size: var(--3xl);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: 1rem;
      line-height: 1.2
    }

    .divider {
      width: 2.5rem;
      height: 3px;
      background: var(--green);
      border-radius: 99px;
      margin-bottom: 2.25rem
    }

    /* ── NEWS ── */
    .news-sec {
      position: relative;
      overflow: hidden
    }

    .news-bg-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: opacity .4s
    }

    /* Hide dark photo in light mode — section gets var(--bg2) instead */
    html:not(.dark) .news-bg-img {
      opacity: 0
    }

    html:not(.dark) .news-sec {
      background: var(--bg2)
    }

    .news-bg-ov {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: background .4s
    }

    .dark .news-bg-ov {
      background: linear-gradient(135deg, rgba(4, 10, 20, .94) 0%, rgba(10, 24, 42, .91) 60%, rgba(4, 10, 20, .89) 100%)
    }

    html:not(.dark) .news-bg-ov {
      background: transparent
    }

    .news-rel {
      position: relative;
      z-index: 2
    }

    .news-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 360px;
      gap: 1.25rem;
      align-items: start
    }

    .news-card {
      background: rgba(255, 255, 255, .045);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--rad);
      padding: clamp(1.5rem, 2.5vw, 2.25rem);
      transition: all .3s;
      height: 100%
    }

    .news-card:hover {
      background: rgba(255, 255, 255, .065);
      border-color: rgba(16, 185, 129, .22);
      transform: translateY(-3px)
    }

    .news-date {
      font-size: var(--xs);
      color: var(--green);
      font-weight: 600;
      margin-bottom: .5rem
    }

    .news-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--lg);
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: .875rem
    }

    .dark .news-hl {
      color: #fff
    }

    html:not(.dark) .news-hl {
      color: var(--txt)
    }

    .news-body {
      font-size: var(--sm);
      line-height: 1.9;
      margin-bottom: .8rem
    }

    .dark .news-body {
      color: rgba(255, 255, 255, .52)
    }

    html:not(.dark) .news-body {
      color: var(--txt2)
    }

    .nlink {
      color: var(--green);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 500;
      transition: color .2s
    }

    .nlink:hover {
      color: #34d399
    }

    /* ── NEWSLETTER ── */
    .nl-card {
      background: linear-gradient(160deg, rgba(16, 185, 129, .12), rgba(16, 185, 129, .04));
      border: 1px solid rgba(16, 185, 129, .18);
      border-radius: calc(var(--rad)*1.1);
      padding: clamp(1.5rem, 2.5vw, 2.25rem);
      position: relative;
      overflow: hidden
    }

    .nl-card::after {
      content: '';
      position: absolute;
      top: -70px;
      right: -70px;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: rgba(16, 185, 129, .07);
      pointer-events: none
    }

    .nl-img-ph {
      width: 100%;
      height: 114px;
      border-radius: .7rem;
      background: rgba(255, 255, 255, .05);
      border: 1.5px dashed rgba(255, 255, 255, .13);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      margin-bottom: 1.375rem;
      font-size: var(--xs);
      color: rgba(255, 255, 255, .28)
    }

    .nl-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      font-weight: 700;
      color: #fff;
      margin-bottom: .35rem
    }

    .nl-sub {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .44);
      margin-bottom: 1.2rem;
      line-height: 1.8
    }

    .nl-inp {
      width: 100%;
      background: rgba(255, 255, 255, .065);
      border: 1.5px solid rgba(255, 255, 255, .1);
      border-radius: .55rem;
      padding: .62rem .9rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--sm);
      margin-bottom: .6rem;
      outline: none;
      transition: border-color .25s
    }

    .nl-inp:focus {
      border-color: var(--green)
    }

    .nl-inp::placeholder {
      color: rgba(255, 255, 255, .28)
    }

    .nl-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: .55rem;
      padding: .72rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: var(--sm);
      cursor: pointer;
      transition: all .25s
    }

    .nl-btn:hover {
      background: var(--green-d);
      transform: translateY(-1px)
    }

    .nl-disc {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .27);
      text-align: center;
      margin-top: .6rem;
      line-height: 1.65
    }

    .nl-ok {
      text-align: center;
      padding: 2rem 0
    }

    .nl-ok i {
      font-size: 2.5rem;
      color: var(--green);
      display: block;
      margin-bottom: .75rem
    }

    .nl-ok-t {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      color: #fff;
      margin-bottom: .4rem
    }

    .nl-ok-b {
      font-size: var(--sm);
      color: rgba(255, 255, 255, .44)
    }

    /* ── ABOUT ── */
    .about-sec {
      position: relative;
      overflow: hidden
    }

    .about-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0
    }

    .about-ov {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: background .35s
    }

    .about-rel {
      position: relative;
      z-index: 2
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: start
    }

    .qblock {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-left: 4px solid var(--green);
      border-radius: var(--rad);
      padding: clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.4rem, 3vw, 2rem);
      margin-bottom: 1.2rem;
      box-shadow: var(--sh)
    }

    .qblock.purple {
      border-left-color: var(--purple)
    }

    .qt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: var(--base);
      color: var(--txt2);
      line-height: 1.9;
      margin-bottom: .8rem
    }

    .qa {
      font-weight: 700;
      color: var(--txt);
      font-size: var(--sm)
    }

    .qr {
      font-size: var(--xs);
      color: var(--txt3);
      margin-top: .12rem
    }

    .about-vis {
      background: linear-gradient(145deg, rgba(11, 25, 41, .98), rgba(22, 45, 74, .96));
      border-radius: var(--rad);
      overflow: hidden
    }

    .mv-photo {
      width: 100%;
      height: clamp(200px, 26vw, 310px);
      object-fit: cover;
      object-position: top center;
      display: block
    }

    .about-vis-body {
      padding: clamp(1.4rem, 2.5vw, 2rem)
    }

    .std-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .875rem;
      margin-bottom: 1.25rem
    }

    .std-item {
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: .7rem;
      padding: .85rem .95rem;
      display: flex;
      align-items: center;
      gap: .55rem
    }

    .std-icon {
      width: 1.9rem;
      height: 1.9rem;
      border-radius: .4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .85rem
    }

    .std-lbl {
      font-size: var(--xs);
      font-weight: 500;
      color: rgba(255, 255, 255, .68);
      line-height: 1.3
    }

    .badges {
      display: flex;
      gap: 1.75rem;
      border-top: 1px solid rgba(255, 255, 255, .07);
      padding-top: 1.1rem
    }

    .badge-n {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      font-weight: 700;
      color: var(--green);
      line-height: 1
    }

    .badge-l {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .37);
      margin-top: .12rem
    }

    /* ── AREAS ── */
    .areas-sec {
      background: var(--bg2)
    }

    .areas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem
    }

    .areas-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr)
    }

    .area-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--rad);
      overflow: hidden;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      flex-direction: column;
      box-shadow: var(--sh)
    }

    .area-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shl)
    }

    .area-card:hover .ac-arr {
      transform: translateX(5px)
    }

    .ac-bar {
      height: 4px;
      flex-shrink: 0
    }

    .ac-img {
      width: 100%;
      height: clamp(120px, 16vw, 180px);
      object-fit: cover;
      display: block;
      background: var(--bg3)
    }

    .ac-body {
      padding: clamp(1.1rem, 2vw, 1.6rem);
      flex: 1;
      display: flex;
      flex-direction: column
    }

    .ac-icon {
      width: clamp(2.25rem, 3.5vw, 3rem);
      height: clamp(2.25rem, 3.5vw, 3rem);
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .875rem;
      font-size: clamp(.875rem, 1.6vw, 1.125rem);
      flex-shrink: 0
    }

    .ac-name {
      font-family: 'Playfair Display', serif;
      font-size: var(--lg);
      font-weight: 700;
      margin-bottom: .5rem;
      color: var(--txt);
      line-height: 1.3
    }

    .ac-desc {
      font-size: var(--xs);
      color: var(--txt2);
      line-height: 1.85;
      flex: 1;
      margin-bottom: 1.1rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .ac-cta {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: var(--sm);
      font-weight: 700;
      transition: gap .25s
    }

    .area-card:hover .ac-cta {
      gap: .65rem
    }

    .ac-arr {
      transition: transform .25s
    }

    /* ── MODAL ── */
    .moverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .78);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto
    }

    .mbox {
      background: var(--bg);
      border-radius: calc(var(--rad)*1.5);
      max-width: min(960px, 96vw);
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .55)
    }

    .mhead {
      padding: clamp(1.375rem, 3vw, 2.1rem) clamp(1.375rem, 3vw, 2.1rem) clamp(1.1rem, 2.5vw, 1.75rem);
      border-bottom: 1px solid var(--bdr);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10
    }

    .mhead-lbl {
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: .35rem
    }

    .mtitle {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: var(--txt)
    }

    .mclose {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      border: 1.5px solid var(--bdr);
      background: var(--surf);
      color: var(--txt2);
      font-size: .9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s
    }

    .mclose:hover {
      background: var(--txt);
      color: var(--bg);
      border-color: var(--txt)
    }

    .mbody {
      padding: clamp(1.375rem, 3vw, 2.1rem)
    }

    .svc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
      margin-bottom: 1.625rem
    }

    .svc-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--rads);
      overflow: hidden
    }

    .svc-img {
      width: 100%;
      height: clamp(115px, 14vw, 155px);
      object-fit: cover;
      display: block
    }

    .svc-img-ph {
      width: 100%;
      height: clamp(115px, 14vw, 155px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      font-size: 1.6rem;
      background: var(--bg2)
    }

    .svc-body {
      padding: 1.05rem
    }

    .svc-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--base);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .6rem;
      line-height: 1.4
    }

    .svc-item {
      display: flex;
      gap: .35rem;
      align-items: flex-start;
      font-size: var(--xs);
      color: var(--txt2);
      line-height: 1.7;
      margin-bottom: .38rem
    }

    .svc-item::before {
      content: '—';
      color: var(--txt3);
      flex-shrink: 0
    }

    .mtest {
      border: 1px solid var(--bdr);
      border-left: 4px solid;
      border-radius: var(--rads);
      padding: clamp(1.1rem, 2.5vw, 1.5rem);
      background: var(--surf2)
    }

    .mtest-lbl {
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: .6rem
    }

    .mtest-txt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: var(--sm);
      color: var(--txt2);
      line-height: 1.9;
      margin-bottom: .55rem
    }

    .mtest-auth {
      font-size: var(--xs);
      color: var(--txt3);
      font-weight: 500
    }

    /* ── RESEARCH ── */
    .research-sec {
      background: #07111E;
      background-image: radial-gradient(ellipse 55% 50% at 8% 82%, rgba(139, 92, 246, .07), transparent 60%)
    }

    .res-card {
      background: rgba(255, 255, 255, .035);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: var(--rad);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 290px
    }

    .res-body {
      padding: clamp(1.75rem, 4vw, 2.75rem)
    }

    .res-date {
      font-size: var(--xs);
      color: #a78bfa;
      font-weight: 600;
      margin-bottom: .5rem
    }

    .res-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: #fff;
      margin-bottom: .5rem;
      line-height: 1.4
    }

    .res-auth {
      font-style: italic;
      font-size: var(--sm);
      color: rgba(255, 255, 255, .4);
      margin-bottom: 1.4rem
    }

    .res-txt {
      font-size: var(--sm);
      color: rgba(255, 255, 255, .52);
      line-height: 1.9;
      margin-bottom: .75rem
    }

    .res-img-col {
      overflow: hidden
    }

    .res-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    /* ── CONTACT ── */
    .contact-sec {
      background: var(--bg)
    }

    /* contact-card base — overridden by new glassmorphic rules below */

    .ct-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--4xl);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .875rem
    }

    .ct-sub {
      font-size: var(--md);
      color: var(--txt2);
      max-width: 580px;
      margin: 0 auto 1.1rem;
      line-height: 1.85
    }

    .ct-body {
      font-size: var(--sm);
      color: var(--txt3);
      max-width: 460px;
      margin: 0 auto 2.1rem
    }

    .ct-btns {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      justify-content: center;
      margin-bottom: 2.625rem
    }

    .soc-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(1rem, 3vw, 1.875rem);
      padding-top: 1.875rem;
      border-top: 1px solid var(--bdr)
    }

    .soc-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .38rem;
      text-decoration: none;
      color: var(--txt2);
      transition: color .25s, transform .25s;
      font-size: var(--xs)
    }

    .soc-item:hover {
      color: var(--green);
      transform: translateY(-4px)
    }

    .soc-icon {
      width: clamp(2.4rem, 4vw, 2.9rem);
      height: clamp(2.4rem, 4vw, 2.9rem);
      border-radius: .75rem;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(.95rem, 1.7vw, 1.15rem);
      transition: all .25s
    }

    .soc-item:hover .soc-icon {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .4);
      color: var(--green)
    }

    /* ── FOOTER: handled by new theme-aware rules below ── */
    .ft-inner {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem
    }

    .ft-logo {
      height: 26px;
      width: auto;
      object-fit: contain;
      opacity: .52
    }

    .ft-tag {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .3);
      letter-spacing: .04em
    }

    .ft-rights {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .2)
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .au1 {
      animation: fadeUp .7s .05s both
    }

    .au2 {
      animation: fadeUp .7s .15s both
    }

    .au3 {
      animation: fadeUp .7s .25s both
    }

    .au4 {
      animation: fadeUp .7s .35s both
    }

    .au5 {
      animation: fadeUp .7s .45s both
    }

    /* ── RESPONSIVE ── */
    @media(max-width:1099px) {
      .news-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto
      }

      .news-grid>:nth-child(3) {
        grid-column: 1/-1
      }

      .areas-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .areas-grid.cols-3 {
        grid-template-columns: repeat(2, 1fr)
      }

      .svc-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .res-card {
        grid-template-columns: 1fr 220px
      }

      .about-grid {
        grid-template-columns: 1fr !important;
        gap: 2rem !important
      }

      .about-vis {
        max-width: 580px
      }
    }

    @media(max-width:767px) {
      .news-grid {
        grid-template-columns: 1fr
      }

      .news-grid>:nth-child(3) {
        grid-column: unset
      }

      .areas-grid,
      .areas-grid.cols-3 {
        grid-template-columns: 1fr
      }

      .svc-grid {
        grid-template-columns: 1fr
      }

      .res-card {
        grid-template-columns: 1fr
      }

      .res-img-col {
        display: none
      }

      .contact-card {
        padding: 2rem 1.25rem
      }

      .mhead {
        padding: 1.1rem
      }

      .mbody {
        padding: 1.1rem
      }

      .ct-btns {
        flex-direction: column;
        align-items: center
      }

      .ct-btns .btn {
        width: 100%;
        max-width: 320px;
        justify-content: center
      }

      .hero-stats {
        gap: 1.5rem
      }
    }

    @media(max-width:480px) {
      .std-grid {
        grid-template-columns: 1fr 1fr
      }

      .badges {
        gap: 1.25rem
      }

      .soc-row {
        gap: .875rem
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       THEME-AWARE DARK SECTIONS + CAROUSEL + CONTACT BG  (v3)
    ═══════════════════════════════════════════════════════════════ */

    /* ── News section overlay ── */
    .news-bg-ov {
      transition: background .4s
    }

    .dark .news-bg-ov {
      background: linear-gradient(135deg, rgba(4, 10, 20, .94) 0%, rgba(10, 24, 42, .91) 60%, rgba(4, 10, 20, .89) 100%)
    }

    html:not(.dark) .news-bg-ov {
      background: linear-gradient(135deg, rgba(248, 245, 240, .97) 0%, rgba(240, 236, 230, .95) 60%, rgba(248, 244, 240, .97) 100%)
    }

    /* ── News card text ── */
    .dark .news-hl {
      color: #fff
    }

    html:not(.dark) .news-hl {
      color: var(--txt)
    }

    .dark .news-body {
      color: rgba(255, 255, 255, .52)
    }

    html:not(.dark) .news-body {
      color: var(--txt2)
    }

    .dark .news-card {
      background: rgba(255, 255, 255, .045);
      border-color: rgba(255, 255, 255, .08)
    }

    html:not(.dark) .news-card {
      background: var(--surf);
      border-color: var(--bdr);
      box-shadow: var(--sh)
    }

    .dark .news-card:hover {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(16, 185, 129, .26)
    }

    html:not(.dark) .news-card:hover {
      background: var(--surf2);
      border-color: rgba(16, 185, 129, .4);
      transform: translateY(-3px)
    }

    /* ── Newsletter card ── */
    .dark .nl-card {
      background: linear-gradient(160deg, rgba(16, 185, 129, .13), rgba(16, 185, 129, .04));
      border-color: rgba(16, 185, 129, .22)
    }

    html:not(.dark) .nl-card {
      background: linear-gradient(160deg, rgba(16, 185, 129, .07), rgba(16, 185, 129, .02));
      border-color: rgba(16, 185, 129, .18)
    }

    .dark .nl-title {
      color: #fff
    }

    html:not(.dark) .nl-title {
      color: var(--txt)
    }

    .dark .nl-sub {
      color: rgba(255, 255, 255, .44)
    }

    html:not(.dark) .nl-sub {
      color: var(--txt2)
    }

    .dark .nl-inp {
      background: rgba(255, 255, 255, .065);
      border-color: rgba(255, 255, 255, .12);
      color: #fff
    }

    .dark .nl-inp::placeholder {
      color: rgba(255, 255, 255, .28)
    }

    html:not(.dark) .nl-inp {
      background: var(--surf);
      border-color: var(--bdr);
      color: var(--txt)
    }

    html:not(.dark) .nl-inp::placeholder {
      color: var(--txt3)
    }

    .dark .nl-disc {
      color: rgba(255, 255, 255, .27)
    }

    html:not(.dark) .nl-disc {
      color: var(--txt3)
    }

    .dark .nl-ok-t {
      color: #fff
    }

    html:not(.dark) .nl-ok-t {
      color: var(--txt)
    }

    .dark .nl-ok-b {
      color: rgba(255, 255, 255, .44)
    }

    html:not(.dark) .nl-ok-b {
      color: var(--txt2)
    }

    .dark .nl-img-ph {
      background: rgba(255, 255, 255, .05);
      border-color: rgba(255, 255, 255, .13);
      color: rgba(255, 255, 255, .28)
    }

    html:not(.dark) .nl-img-ph {
      background: var(--bg2);
      border-color: var(--bdr);
      color: var(--txt3)
    }

    /* ── Quatro Pilares panel (about-vis) ── */
    .dark .about-vis {
      background: linear-gradient(145deg, rgba(11, 25, 41, .98), rgba(22, 45, 74, .96))
    }

    html:not(.dark) .about-vis {
      background: linear-gradient(145deg, #1a3655, #0e2035)
    }

    .dark .std-item {
      background: rgba(255, 255, 255, .055);
      border-color: rgba(255, 255, 255, .07)
    }

    html:not(.dark) .std-item {
      background: rgba(255, 255, 255, .06);
      border-color: rgba(255, 255, 255, .1)
    }

    /* ── Research section ── */
    .dark .research-sec {
      background: #07111E;
      background-image: radial-gradient(ellipse 55% 50% at 8% 82%, rgba(139, 92, 246, .07), transparent 60%)
    }

    html:not(.dark) .research-sec {
      background: var(--bg2);
      background-image: radial-gradient(ellipse 55% 50% at 8% 82%, rgba(139, 92, 246, .04), transparent 60%)
    }

    .dark .res-date {
      color: #a78bfa
    }

    html:not(.dark) .res-date {
      color: var(--purple)
    }

    .dark .res-hl {
      color: #fff
    }

    html:not(.dark) .res-hl {
      color: var(--txt)
    }

    .dark .res-auth {
      color: rgba(255, 255, 255, .4)
    }

    html:not(.dark) .res-auth {
      color: var(--txt2)
    }

    .dark .res-txt {
      color: rgba(255, 255, 255, .52)
    }

    html:not(.dark) .res-txt {
      color: var(--txt2)
    }

    .dark .res-card {
      background: rgba(255, 255, 255, .035);
      border-color: rgba(255, 255, 255, .07)
    }

    html:not(.dark) .res-card {
      background: var(--surf);
      border-color: var(--bdr);
      box-shadow: var(--sh)
    }

    /* ── Footer ── */
    footer {
      transition: background .35s
    }

    .dark footer {
      background: #050D16
    }

    html:not(.dark) footer {
      background: #0B1929
    }

    /* ── Contact: background image + glassy card ── */
    .contact-sec {
      position: relative;
      overflow: hidden
    }

    .contact-bg-img {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: url('https://esgetal.com.br/engl/images/768abd4ed93aca197a318dba1fefa5ea.png');
      background-size: cover;
      background-position: center 30%;
    }

    .contact-bg-ov {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: background .4s
    }

    .dark .contact-bg-ov {
      background: linear-gradient(135deg, rgba(8, 17, 28, .93) 0%, rgba(11, 25, 41, .88) 100%)
    }

    html:not(.dark) .contact-bg-ov {
      background: linear-gradient(135deg, rgba(248, 245, 240, .93) 0%, rgba(238, 234, 228, .9) 100%)
    }

    .contact-rel {
      position: relative;
      z-index: 2
    }

    .dark .contact-card {
      background: rgba(10, 22, 38, .72);
      border-color: rgba(255, 255, 255, .1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px)
    }

    html:not(.dark) .contact-card {
      background: rgba(255, 255, 255, .84);
      border-color: rgba(14, 32, 53, .12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px)
    }

    /* ═══ CAROUSEL ENGINE ═══ */
    .cr-wrap {
      position: relative;
      overflow: hidden
    }

    .cr-track {
      display: flex;
      gap: clamp(.875rem, 1.5vw, 1.25rem);
      transition: transform .56s cubic-bezier(.25, .46, .45, .94);
      will-change: transform
    }

    .cr-slide {
      flex-shrink: 0;
      display: flex;
      flex-direction: column
    }

    /* Nav bar */
    .cr-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .625rem;
      margin-top: 1.75rem
    }

    .cr-btn {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      border: 1.5px solid var(--bdr);
      background: var(--surf);
      color: var(--txt2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      transition: all .25s;
      flex-shrink: 0
    }

    .cr-btn:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .07)
    }

    .cr-btn:disabled {
      opacity: .28;
      cursor: default;
      pointer-events: none
    }

    .dark .cr-btn {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .14)
    }

    .dark .cr-btn:hover:not(:disabled) {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .4)
    }

    /* Dots */
    .cr-dots {
      display: flex;
      gap: .375rem;
      align-items: center
    }

    .cr-dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: var(--bdr);
      border: none;
      cursor: pointer;
      transition: width .35s, background .35s;
      padding: 0;
      flex-shrink: 0
    }

    .dark .cr-dot {
      background: rgba(255, 255, 255, .2)
    }

    .cr-dot.on {
      width: 22px;
      background: var(--green)
    }

    /* Keep area cards same height in carousel */
    #areas-cr .cr-slide {
      height: 100%
    }

    #areas-cr .area-card {
      height: 100%
    }

    /* ── News layout: carousel left + newsletter right ── */
    .news-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.25rem;
      align-items: start;
    }

    @media(max-width:1099px) {
      .news-layout {
        grid-template-columns: 1fr
      }
    }

    /* news carousel nav styling: match dark bg */
    #news-fixed-cr .cr-btn {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .5)
    }

    #news-fixed-cr .cr-btn:hover:not(:disabled) {
      background: rgba(16, 185, 129, .12);
      border-color: rgba(16, 185, 129, .45);
      color: #10B981
    }

    #news-fixed-cr .cr-dot {
      background: rgba(255, 255, 255, .18)
    }

    html:not(.dark) #news-fixed-cr .cr-btn {
      background: rgba(255, 255, 255, .7);
      border-color: rgba(14, 32, 53, .18);
      color: var(--txt2)
    }

    html:not(.dark) #news-fixed-cr .cr-btn:hover:not(:disabled) {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .5)
    }

    html:not(.dark) #news-fixed-cr .cr-dot {
      background: rgba(14, 32, 53, .18)
    }

    /* ── Newsletter: standalone elegant card ── */
    .nl-standalone {
      border-radius: calc(var(--rad) * 1.15);
      border: 1px solid rgba(16, 185, 129, .22);
      padding: clamp(1.5rem, 2.5vw, 2.25rem);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .dark .nl-standalone {
      background: linear-gradient(145deg, rgba(7, 26, 46, .95) 0%, rgba(5, 18, 32, .9) 100%);
    }

    html:not(.dark) .nl-standalone {
      background: linear-gradient(145deg, rgba(255, 255, 255, .97) 0%, rgba(242, 248, 244, .95) 100%);
    }

    /* decorative ring */
    .nl-standalone::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(16, 185, 129, .1);
      pointer-events: none;
      z-index: 0;
    }

    .nl-standalone::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(16, 185, 129, .07);
      pointer-events: none;
      z-index: 0;
    }

    .nl-standalone>* {
      position: relative;
      z-index: 1
    }

    .nl-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .22rem .7rem;
      border-radius: 99px;
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .22);
      color: var(--green);
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .nl-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      font-weight: 700;
      margin-bottom: .35rem
    }

    .dark .nl-title {
      color: #fff
    }

    html:not(.dark) .nl-title {
      color: var(--txt)
    }

    .nl-divider {
      width: 2rem;
      height: 2px;
      background: var(--green);
      border-radius: 99px;
      margin-bottom: .875rem
    }

    .nl-sub {
      font-size: var(--xs);
      line-height: 1.85;
      margin-bottom: 1.25rem
    }

    .dark .nl-sub {
      color: rgba(255, 255, 255, .48)
    }

    html:not(.dark) .nl-sub {
      color: var(--txt2)
    }

    .nl-inp-wrap {
      position: relative;
      margin-bottom: .55rem
    }

    .nl-inp-ico {
      position: absolute;
      left: .8rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: .78rem;
      pointer-events: none;
      transition: color .2s;
    }

    .dark .nl-inp-ico {
      color: rgba(255, 255, 255, .28)
    }

    html:not(.dark) .nl-inp-ico {
      color: var(--txt3)
    }

    .nl-inp {
      padding-left: 2.2rem
    }

    .nl-ok {
      text-align: center;
      padding: 1.5rem 0
    }

    .nl-ok i {
      font-size: 2.5rem;
      color: var(--green);
      display: block;
      margin-bottom: .75rem
    }

    .nl-ok-t {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      margin-bottom: .4rem
    }

    .dark .nl-ok-t {
      color: #fff
    }

    html:not(.dark) .nl-ok-t {
      color: var(--txt)
    }

    .dark .nl-ok-b {
      color: rgba(255, 255, 255, .44)
    }

    html:not(.dark) .nl-ok-b {
      color: var(--txt2)
    }

    /* ── About-vis / Four pillars: full theme ── */
    .about-vis {
      border-radius: var(--rad);
      overflow: hidden;
      background: linear-gradient(145deg, #0e2035, #1a3655);
    }

    /* no more theme override needed — always dark-navy */
    .std-item {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      transition: background .2s, border-color .2s;
    }

    .std-item:hover {
      background: rgba(255, 255, 255, .11);
      border-color: rgba(255, 255, 255, .18)
    }

    .std-lbl {
      color: rgba(255, 255, 255, .72)
    }

    .badge-l {
      color: rgba(255, 255, 255, .4)
    }

    /* ── Research extras: 50% + image col ── */
    #dyn-res-cr {
      max-width: 60%
    }

    @media(max-width:1099px) {
      #dyn-res-cr {
        max-width: 100%
      }
    }

    #dyn-res-cr .cr-slide {
      display: grid;
      grid-template-columns: 1fr 240px;
      border-radius: var(--rad);
      overflow: hidden;
      min-width: 0;
    }

    @media(max-width:767px) {
      #dyn-res-cr .cr-slide {
        grid-template-columns: 1fr
      }
    }

    .dyn-res-img-col {
      overflow: hidden;
      min-height: 220px
    }

    .dyn-res-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .dyn-res-img-ph {
      width: 100%;
      height: 100%;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      font-size: var(--xs);
    }

    .dark .dyn-res-img-ph {
      background: rgba(255, 255, 255, .04);
      color: rgba(255, 255, 255, .22)
    }

    html:not(.dark) .dyn-res-img-ph {
      background: var(--bg3);
      color: var(--txt3)
    }

    /* ── Contact card — fully glassmorphic ── */
    .contact-card {
      border-radius: calc(var(--rad) * 1.5);
      text-align: center;
      padding: clamp(2.5rem, 6vw, 5rem) clamp(1.5rem, 5vw, 4rem);
    }

    .dark .contact-card {
      background: rgba(8, 18, 34, .55);
      border: 1px solid rgba(255, 255, 255, .1);
      box-shadow: 0 8px 48px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .07);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
    }

    html:not(.dark) .contact-card {
      background: rgba(255, 255, 255, .65);
      border: 1px solid rgba(14, 32, 53, .12);
      box-shadow: 0 8px 48px rgba(14, 32, 53, .14), inset 0 1px 0 rgba(255, 255, 255, .9);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
    }

    /* ct-title inherits var(--txt) so it works in both modes already */

    /* ── Footer: full adaptive theme ── */
    footer {
      padding: clamp(1.1rem, 2.5vw, 1.75rem) clamp(1.25rem, 5vw, 4rem);
      transition: background .35s
    }

    .dark footer {
      background: #050D16;
    }

    html:not(.dark) footer {
      background: #0B1929;
      /* stays dark-navy in light mode too — brand choice */
    }

    /* make sure footer text is always light */
    footer .ft-tag {
      color: rgba(255, 255, 255, .32)
    }

    footer .ft-rights {
      color: rgba(255, 255, 255, .2)
    }

    /* news section heading color follows theme */
    .dark .news-sec .sec-h {
      color: #fff
    }

    html:not(.dark) .news-sec .sec-h {
      color: var(--txt)
    }

    .dark .news-sec .sec-lbl {
      color: var(--green)
    }

    html:not(.dark) .news-sec .sec-lbl {
      color: var(--green)
    }

    /* ── News card theme fix ── */
    .dark .news-card {
      background: rgba(255, 255, 255, .045);
      border-color: rgba(255, 255, 255, .08)
    }

    html:not(.dark) .news-card {
      background: var(--surf);
      border-color: var(--bdr);
      box-shadow: var(--sh)
    }

    .dark .news-card:hover {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(16, 185, 129, .26)
    }

    html:not(.dark) .news-card:hover {
      background: var(--surf2);
      border-color: rgba(16, 185, 129, .4);
      transform: translateY(-3px)
    }

    /* ── News unified carousel: 2 per view, equal height ── */
    .news-sec .cr-wrap {
      overflow: visible
    }

    /* allow card shadows to show */
    .news-sec .cr-track {
      align-items: stretch
    }

    #news-cr .cr-slide {
      height: auto
    }

    #news-cr .news-card {
      height: 100%;
      box-sizing: border-box
    }

    #news-cr .nl-standalone {
      height: 100%;
      box-sizing: border-box
    }

    /* nav inside dark section */
    #news-cr .cr-btn {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .55)
    }

    #news-cr .cr-btn:hover:not(:disabled) {
      background: rgba(16, 185, 129, .14);
      border-color: rgba(16, 185, 129, .5);
      color: #10B981
    }

    #news-cr .cr-dot {
      background: rgba(255, 255, 255, .2)
    }

    html:not(.dark) #news-cr .cr-btn {
      background: var(--surf);
      border-color: var(--bdr);
      color: var(--txt2)
    }

    html:not(.dark) #news-cr .cr-btn:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green)
    }

    html:not(.dark) #news-cr .cr-dot {
      background: var(--bdr)
    }

    #news-cr .cr-dot.on {
      background: var(--green)
    }

    /* ── Research compact card ── */
    .res-card-sm {
      border-radius: var(--rad);
      padding: clamp(1.25rem, 2vw, 1.75rem);
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .dark .res-card-sm {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .09)
    }

    html:not(.dark) .res-card-sm {
      background: var(--surf);
      border: 1px solid var(--bdr);
      box-shadow: var(--sh)
    }

    .res-card-sm .res-date {
      font-size: var(--xs);
      font-weight: 600;
      margin-bottom: .5rem
    }

    .dark .res-card-sm .res-date {
      color: #a78bfa
    }

    html:not(.dark) .res-card-sm .res-date {
      color: var(--purple)
    }

    .res-card-sm .res-hl {
      font-size: var(--md);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: .5rem
    }

    .dark .res-card-sm .res-hl {
      color: #fff
    }

    html:not(.dark) .res-card-sm .res-hl {
      color: var(--txt)
    }

    .res-card-sm .res-auth {
      font-size: var(--xs);
      font-style: italic;
      margin-bottom: .875rem;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .dark .res-card-sm .res-auth {
      color: rgba(255, 255, 255, .38)
    }

    html:not(.dark) .res-card-sm .res-auth {
      color: var(--txt3)
    }

    .res-card-sm .res-txt {
      font-size: var(--xs);
      line-height: 1.8;
      margin-bottom: .5rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .dark .res-card-sm .res-txt {
      color: rgba(255, 255, 255, .48)
    }

    html:not(.dark) .res-card-sm .res-txt {
      color: var(--txt2)
    }

    /* ── Research unified carousel: 3 per view, equal height ── */
    #research-cr {
      margin-top: 1.75rem
    }

    #research-cr .cr-track {
      align-items: stretch
    }

    #research-cr .cr-slide {
      height: auto
    }

    /* nav inside dark/light section */
    .dark #research-cr .cr-btn {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .14);
      color: rgba(255, 255, 255, .55)
    }

    .dark #research-cr .cr-btn:hover:not(:disabled) {
      background: rgba(139, 92, 246, .14);
      border-color: rgba(139, 92, 246, .5);
      color: #a78bfa
    }

    .dark #research-cr .cr-dot {
      background: rgba(255, 255, 255, .2)
    }

    html:not(.dark) #research-cr .cr-btn {
      background: var(--surf);
      border-color: var(--bdr);
      color: var(--txt2)
    }

    html:not(.dark) #research-cr .cr-btn:hover:not(:disabled) {
      border-color: var(--purple);
      color: var(--purple)
    }

    html:not(.dark) #research-cr .cr-dot {
      background: var(--bdr)
    }

    #research-cr .cr-dot.on {
      background: var(--purple)
    }
  </style>
</head>

<body>

  <!-- ══ NAVBAR ══ -->
  <nav class="navbar" :class="scrollY>60?'is-scrolled':'is-top'">
    <div class="nav-inner">

      <!-- Logo: x-show does clean display:none swap — no absolute stacking -->
      <div class="nav-logo" @click="scrollTo('home')">
        <img src="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" alt="ESG e Tal"
          x-show="darkMode || scrollY <= 60">
        <img src="https://esgetal.com.br/engl/images/e8f5f57216f727d0ee0df67b8110f48c.png" alt="ESG e Tal"
          x-show="!darkMode && scrollY > 60">
      </div>

      <!-- Desktop links -->
      <nav class="nav-links">
        <template x-for="item in ['home','news','about','areas','research','contact']" :key="item">
          <span class="nav-lnk" :class="{active:activeSection===item}" @click="scrollTo(item)"
            x-text="t('nav.'+item)"></span>
        </template>
      </nav>

      <!-- Controls -->
      <div class="nav-ctrl">
        <button class="tbtn" @click="toggleLang()">
          <span x-show="lang==='pt'">🇧🇷</span><span x-show="lang==='pt'"
            style="font-size:.68rem;font-weight:600">PT</span>
          <span x-show="lang==='en'">🇺🇸</span><span x-show="lang==='en'"
            style="font-size:.68rem;font-weight:600">EN</span>
        </button>
        <button class="tbtn" @click="toggleDark()">
          <i :class="darkMode?'fa-solid fa-sun':'fa-solid fa-moon'" style="font-size:.8rem"></i>
        </button>
        <button class="tbtn nav-burger" @click="mobileMenuOpen=true">
          <i class="fa-solid fa-bars" style="font-size:.85rem"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile overlay -->
  <div class="mm-ov" x-show="mobileMenuOpen" x-cloak @click="mobileMenuOpen=false"
    x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>

  <!-- Mobile panel -->
  <div class="mm-panel" x-show="mobileMenuOpen" x-cloak x-transition:enter="transition ease-out duration-250"
    x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-180" x-transition:leave-start="opacity-100 translate-x-0"
    x-transition:leave-end="opacity-0 translate-x-8">
    <div class="mm-head">
      <img
        :src="darkMode?'https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png':'https://esgetal.com.br/engl/images/e8f5f57216f727d0ee0df67b8110f48c.png'"
        alt="ESG e Tal" style="height:30px;width:auto;object-fit:contain">
      <button class="tbtn" @click="mobileMenuOpen=false"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <template x-for="item in ['home','news','about','areas','research','contact']" :key="item">
      <span class="mm-lnk" :class="{active:activeSection===item}" @click="scrollTo(item)"
        x-text="t('nav.'+item)"></span>
    </template>
    <div class="mm-foot">
      <button class="tbtn" style="flex:1;justify-content:center" @click="toggleLang()">
        <span x-text="lang==='pt'?'🇧🇷 PT-BR':'🇺🇸 EN'"></span>
      </button>
      <button class="tbtn" style="flex:1;justify-content:center" @click="toggleDark()">
        <i :class="darkMode?'fa-solid fa-sun':'fa-solid fa-moon'"></i>
        <span x-text="darkMode?(lang==='pt'?'Claro':'Light'):(lang==='pt'?'Escuro':'Dark')"></span>
      </button>
    </div>
  </div>


  <!-- ══ HERO ══ -->
  <section id="home" class="hero"
    style="background-image:url('https://esgetal.com.br/_assets/media/6bfd004501232b8760269d32e0ca4866.jpg');background-position:top center">
    <div class="hero-ov"></div>
    <div class="hero-grid"></div>
    <div class="hero-glow"></div>
    <div class="hero-cnt">
      <!-- ONE logo in hero, always white -->
      <img src="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" alt="ESG e Tal Consultancy"
        class="hero-logo au1">
      <h1 class="hero-hl au2">
        <span class="ac" x-text="t('hero.tag1')"></span><br>
        <span x-text="t('hero.tag2')"></span><br>
        <span x-text="t('hero.tag3')"></span>
      </h1>
      <p class="hero-sub au3" x-text="t('hero.subtitle')"></p>
      <div class="hero-actions au4">
        <button class="btn btn-g" @click="scrollTo('contact')"><i class="fa-solid fa-arrow-right"></i><span
            x-text="t('hero.cta')"></span></button>
        <button class="btn btn-w" @click="scrollTo('areas')"><span x-text="t('hero.ctaSub')"></span><i
            class="fa-solid fa-chevron-down"></i></button>
      </div>
      <div class="hero-stats au5">
        <template x-for="stat in heroStats" :key="stat.value">
          <div>
            <div class="stat-n" x-text="stat.value"></div>
            <div class="stat-l" x-text="heroStatLabel(stat)"></div>
          </div>
        </template>
      </div>
    </div>
    <div class="scroll-cue" @click="scrollTo('news')">
      <div style="width:1px;height:30px;background:linear-gradient(to bottom,rgba(16,185,129,.7),transparent)"></div>
      <i class="fa-solid fa-chevron-down" style="color:rgba(255,255,255,.35);font-size:.62rem"></i>
    </div>
  </section>


  <!-- ══ NEWS ══ -->
  <section id="news" class="news-sec">

  <!-- ═══ CAROUSEL ENGINE ═══ -->
  <script>
      (function () {
        window.CMS = window.CMS || {};

        CMS.initCarousel = function (id, opts) {
          opts = Object.assign({ desktop: 2, tablet: 2, mobile: 1, autoplay: 0 }, opts);
          var wrap = document.getElementById(id);
          if (!wrap) return;

          if (wrap._cr) { clearInterval(wrap._cr.autoTimer); if (wrap._cr.ro) wrap._cr.ro.disconnect(); }
          wrap._cr = {};

          var track = wrap.querySelector('.cr-track');
          var dotsEl = wrap.querySelector('.cr-dots');
          if (!track) return;

          var cur = 0;

          function slides() { return Array.prototype.slice.call(track.querySelectorAll('.cr-slide')); }
          function gap() { return parseFloat(getComputedStyle(track).gap) || 20; }

          function pv() {
            var w = wrap.offsetWidth;
            var n = w > 1100 ? opts.desktop : w > 640 ? opts.tablet : (opts.mobile || 1);
            return Math.max(1, Math.min(n, slides().length));
          }

          function slideW() {
            var n = pv(), g = gap();
            return (wrap.offsetWidth - (n - 1) * g) / n;
          }

          function maxCur() { return Math.max(0, slides().length - pv()); }

          function buildDots() {
            if (!dotsEl) return;
            var m = maxCur();
            dotsEl.innerHTML = '';
            for (var i = 0; i <= m; i++) {
              (function (idx) {
                var d = document.createElement('button');
                d.className = 'cr-dot' + (idx === cur ? ' on' : '');
                d.setAttribute('aria-label', 'Slide ' + (idx + 1));
                d.addEventListener('click', function () { resetAuto(); go(idx); });
                dotsEl.appendChild(d);
              })(i);
            }
            var nav = wrap.querySelector('.cr-nav');
            if (nav) nav.style.display = m <= 0 ? 'none' : '';
          }

          function updateNav() {
            if (dotsEl) {
              Array.prototype.forEach.call(dotsEl.querySelectorAll('.cr-dot'), function (d, i) {
                d.classList.toggle('on', i === cur);
              });
            }
            var pEl = wrap.querySelector('[data-prev]');
            var nEl = wrap.querySelector('[data-next]');
            if (pEl) pEl.disabled = cur <= 0;
            if (nEl) nEl.disabled = cur >= maxCur();
          }

          function go(n, instant) {
            cur = Math.max(0, Math.min(maxCur(), n));
            var offset = cur * (slideW() + gap());
            if (instant) {
              var prev = track.style.transition;
              track.style.transition = 'none';
              track.style.transform = 'translateX(-' + offset + 'px)';
              track.offsetHeight;
              track.style.transition = prev;
            } else {
              track.style.transform = 'translateX(-' + offset + 'px)';
            }
            updateNav();
          }

          function layout() {
            var w = slideW();
            slides().forEach(function (s) { s.style.width = w + 'px'; });
            buildDots();
            go(Math.min(cur, maxCur()), true);
          }

          var autoTimer = null;
          function resetAuto() {
            clearInterval(autoTimer);
            if (opts.autoplay) {
              autoTimer = setInterval(function () {
                cur >= maxCur() ? go(0) : go(cur + 1);
              }, opts.autoplay);
            }
          }

          // Clone buttons to clear old listeners
          var pOld = wrap.querySelector('[data-prev]');
          var nOld = wrap.querySelector('[data-next]');
          if (pOld) { var pNew = pOld.cloneNode(true); pOld.parentNode.replaceChild(pNew, pOld); }
          if (nOld) { var nNew = nOld.cloneNode(true); nOld.parentNode.replaceChild(nNew, nOld); }
          var pEl = wrap.querySelector('[data-prev]');
          var nEl = wrap.querySelector('[data-next]');
          if (pEl) pEl.addEventListener('click', function () { resetAuto(); go(cur - 1); });
          if (nEl) nEl.addEventListener('click', function () { resetAuto(); cur >= maxCur() ? go(0) : go(cur + 1); });

          // Touch / drag
          var tx = 0, ty = 0, dragging = false;
          track.addEventListener('pointerdown', function (e) { tx = e.clientX; ty = e.clientY; dragging = true; track.setPointerCapture(e.pointerId); });
          track.addEventListener('pointerup', function (e) {
            if (!dragging) return;
            dragging = false;
            var dx = e.clientX - tx, dy = e.clientY - ty;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
              resetAuto(); dx < 0 ? go(cur + 1) : go(cur - 1);
            }
          });
          track.addEventListener('pointerleave', function () { dragging = false; });
          track.addEventListener('pointercancel', function () { dragging = false; });

          // Prevent accidental click after drag
          track.addEventListener('click', function (e) {
            if (Math.abs(e.clientX - tx) > 10) e.stopPropagation();
          }, true);

          if (opts.autoplay) {
            wrap.addEventListener('mouseenter', function () { clearInterval(autoTimer); });
            wrap.addEventListener('mouseleave', resetAuto);
          }

          if (window.ResizeObserver) {
            var rTimer;
            var ro = new ResizeObserver(function () {
              clearTimeout(rTimer);
              rTimer = setTimeout(layout, 80);
            });
            ro.observe(wrap);
            wrap._cr.ro = ro;
          }

          wrap._cr.autoTimer = autoTimer;
          layout();
          resetAuto();
        };
      })();
  </script>

</body>

</html>
