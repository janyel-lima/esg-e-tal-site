<!DOCTYPE html>
<html lang="pt-BR" x-data="app()" :class="{ 'dark': darkMode }" x-init="init()">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESG e Tal Consultancy</title>
  <meta name="description"
    content="Consultoria ESG especializada em Meio Ambiente, Responsabilidade Social, Governança e Comunicação Estratégica.">
  <link rel="icon" href="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>tailwind = { config: { darkMode: 'class' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="main.js"></script>
  <!-- Firebase Compat SDK (carregado antes do admin.js) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <!-- Configuração Firebase — preencha firebase-config.js com suas credenciais -->
  <script src="firebase-config.js"></script>
  <!-- Admin Panel CMS — ativar com Ctrl + Shift + A -->
  <script src="admin.js" defer></script>
  <style>
    /* RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    [x-cloak] {
      display: none !important
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'DM Sans', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--txt);
      transition: background .3s, color .3s
    }

    /* TOKENS */
    :root {
      --green: #10B981;
      --green-d: #059669;
      --gold: #F59E0B;
      --blue: #3B82F6;
      --purple: #8B5CF6;
      --purple-d: #7C3AED;
      --navy: #0B1929;
      --navy3: #162D4A;
      --bg: #FAFAF8;
      --bg2: #F2EFE9;
      --bg3: #E8E4DC;
      --surf: #FFFFFF;
      --surf2: #F7F5F0;
      --bdr: rgba(14, 32, 53, .1);
      --txt: #0D1B2E;
      --txt2: #3A5170;
      --txt3: #6B8299;
      --sh: 0 2px 16px rgba(14, 32, 53, .08);
      --shl: 0 8px 40px rgba(14, 32, 53, .14);
      --rad: 1rem;
      --rads: .5rem;
      --nav-h: 68px;
      /* Fluid type scale */
      --xs: clamp(.68rem, .62rem + .28vw, .8rem);
      --sm: clamp(.8rem, .74rem + .3vw, .9rem);
      --base: clamp(.875rem, .82rem + .27vw, 1rem);
      --md: clamp(1rem, .92rem + .4vw, 1.125rem);
      --lg: clamp(1.1rem, 1rem + .55vw, 1.3rem);
      --xl: clamp(1.2rem, 1.05rem + .85vw, 1.6rem);
      --2xl: clamp(1.45rem, 1.1rem + 1.6vw, 2.1rem);
      --3xl: clamp(1.8rem, 1.3rem + 2.5vw, 2.875rem);
      --4xl: clamp(2.2rem, 1.4rem + 4vw, 4rem);
      --hero: clamp(2.65rem, 1.4rem + 6.5vw, 6rem);
    }

    .dark {
      --bg: #08111C;
      --bg2: #0C1825;
      --bg3: #111F2E;
      --surf: #0F1E30;
      --surf2: #152840;
      --bdr: rgba(255, 255, 255, .07);
      --txt: #E4EDF6;
      --txt2: #94AECB;
      --txt3: #5F7A96;
      --sh: 0 2px 16px rgba(0, 0, 0, .35);
      --shl: 0 8px 40px rgba(0, 0, 0, .5);
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--navy3);
      border-radius: 99px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--green)
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-h);
      transition: background .35s, box-shadow .35s, border-color .35s;
      border-bottom: 1px solid transparent
    }

    /* Over dark hero */
    .navbar.is-top .nav-lnk {
      color: rgba(255, 255, 255, .72)
    }

    .navbar.is-top .nav-lnk:hover,
    .navbar.is-top .nav-lnk.active {
      color: #fff
    }

    .navbar.is-top .nav-lnk::after {
      background: #fff
    }

    .navbar.is-top .tbtn {
      border-color: rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .09);
      color: rgba(255, 255, 255, .8);
      backdrop-filter: blur(4px)
    }

    .navbar.is-top .tbtn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .14)
    }

    /* Scrolled */
    .navbar.is-scrolled {
      background: var(--bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--sh);
      border-bottom-color: var(--bdr)
    }

    .navbar.is-scrolled .nav-lnk {
      color: var(--txt2)
    }

    .navbar.is-scrolled .nav-lnk:hover,
    .navbar.is-scrolled .nav-lnk.active {
      color: var(--txt)
    }

    .navbar.is-scrolled .nav-lnk::after {
      background: var(--green)
    }

    .navbar.is-scrolled .tbtn {
      border-color: var(--bdr);
      background: var(--surf);
      color: var(--txt2)
    }

    .navbar.is-scrolled .tbtn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .05)
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      max-width: 1440px;
      margin: 0 auto;
      gap: clamp(.75rem, 2vw, 1.5rem)
    }

    /* Logo — no absolute positioning, use x-show for clean swap */
    .nav-logo {
      height: 38px;
      display: flex;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 0
    }

    .nav-logo img {
      height: 100%;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      display: block
    }

    /* Desktop links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(.625rem, 1.4vw, 1.75rem);
      flex: 1;
      justify-content: center;
      min-width: 0
    }

    .nav-lnk {
      font-size: var(--sm);
      font-weight: 500;
      cursor: pointer;
      position: relative;
      padding: .2rem 0;
      transition: color .25s;
      white-space: nowrap
    }

    .nav-lnk::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 2px;
      border-radius: 99px;
      transition: width .3s
    }

    .nav-lnk:hover::after,
    .nav-lnk.active::after {
      width: 100%
    }

    .nav-ctrl {
      display: flex;
      align-items: center;
      gap: .4rem;
      flex-shrink: 0
    }

    .tbtn {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .3rem .6rem;
      border-radius: 99px;
      border: 1.5px solid;
      font-size: var(--xs);
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      font-family: 'DM Sans', sans-serif;
      line-height: 1
    }

    /* Hide/show at breakpoint */
    @media(min-width:1100px) {
      .nav-burger {
        display: none !important
      }
    }

    @media(max-width:1099px) {
      .nav-links {
        display: none !important
      }
    }

    /* ── MOBILE MENU ── */
    .mm-ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .58);
      z-index: 140;
      backdrop-filter: blur(3px)
    }

    .mm-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(295px, 88vw);
      background: var(--surf);
      z-index: 150;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
      box-shadow: -12px 0 60px rgba(0, 0, 0, .28);
      overflow-y: auto
    }

    .mm-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--bdr)
    }

    .mm-lnk {
      display: block;
      padding: .7rem 1rem;
      border-radius: .5rem;
      color: var(--txt2);
      font-weight: 500;
      cursor: pointer;
      font-size: var(--md);
      transition: all .25s;
      border-left: 2px solid transparent
    }

    .mm-lnk:hover,
    .mm-lnk.active {
      background: rgba(16, 185, 129, .07);
      color: var(--green);
      border-left-color: var(--green);
      padding-left: 1.375rem
    }

    .mm-foot {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--bdr);
      display: flex;
      gap: .5rem
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center
    }

    .hero-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(4, 10, 20, .92) 0%, rgba(10, 24, 42, .8) 45%, rgba(4, 10, 20, .7) 100%);
      z-index: 1
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      z-index: 2;
      background-image: linear-gradient(rgba(16, 185, 129, .033) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, .033) 1px, transparent 1px);
      background-size: clamp(42px, 6vw, 70px) clamp(42px, 6vw, 70px);
      mask-image: radial-gradient(ellipse at 25% 50%, black 0%, transparent 72%)
    }

    .hero-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse 65% 70% at 80% 45%, rgba(16, 185, 129, .1) 0%, transparent 65%)
    }

    .hero-cnt {
      position: relative;
      z-index: 3;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
      padding: calc(var(--nav-h) + clamp(3rem, 7vh, 5.5rem)) clamp(1.25rem, 5vw, 4rem) clamp(3rem, 7vh, 4.5rem)
    }

    .hero-logo {
      height: clamp(34px, 4.5vw, 54px);
      width: auto;
      object-fit: contain;
      display: block;
      margin-bottom: clamp(1.5rem, 4vw, 2.75rem)
    }

    .hero-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--hero);
      font-weight: 700;
      color: #fff;
      line-height: 1.04;
      margin-bottom: clamp(1rem, 2.5vw, 1.75rem);
      letter-spacing: -.01em
    }

    .hero-hl .ac {
      color: var(--green)
    }

    .hero-sub {
      font-size: var(--md);
      color: rgba(255, 255, 255, .5);
      max-width: min(520px, 90%);
      margin-bottom: clamp(1.5rem, 4vw, 2.75rem);
      line-height: 1.9
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: clamp(2.5rem, 6vw, 4rem)
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(1.5rem, 4vw, 3rem);
      border-top: 1px solid rgba(255, 255, 255, .08);
      padding-top: clamp(1.25rem, 3vw, 2rem)
    }

    .stat-n {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: var(--green);
      line-height: 1
    }

    .stat-l {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .38);
      margin-top: .18rem
    }

    .scroll-cue {
      position: absolute;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      cursor: pointer;
      z-index: 3;
      opacity: .45;
      transition: opacity .25s
    }

    .scroll-cue:hover {
      opacity: .8
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: clamp(.6rem, 1.5vw, .875rem) clamp(1.1rem, 2.8vw, 1.875rem);
      border-radius: 99px;
      font-weight: 600;
      font-size: var(--sm);
      cursor: pointer;
      transition: all .3s;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      border: none;
      white-space: nowrap
    }

    .btn-g {
      background: var(--green);
      color: #fff
    }

    .btn-g:hover {
      background: var(--green-d);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(16, 185, 129, .38)
    }

    .btn-w {
      background: transparent;
      color: rgba(255, 255, 255, .78);
      border: 1.5px solid rgba(255, 255, 255, .22)
    }

    .btn-w:hover {
      border-color: rgba(255, 255, 255, .55);
      color: #fff;
      background: rgba(255, 255, 255, .06)
    }

    .btn-ghost {
      background: var(--surf);
      color: var(--txt);
      border: 1.5px solid var(--bdr)
    }

    .btn-ghost:hover {
      border-color: var(--green);
      color: var(--green)
    }

    .btn-purple {
      background: var(--purple);
      color: #fff
    }

    .btn-purple:hover {
      background: var(--purple-d);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139, 92, 246, .38)
    }

    /* ── SECTION SHARED ── */
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: clamp(3.5rem, 7vw, 6.5rem) clamp(1.25rem, 5vw, 4rem)
    }

    .sec-lbl {
      display: inline-block;
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: .55rem
    }

    .sec-h {
      font-family: 'Playfair Display', serif;
      font-size: var(--3xl);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: 1rem;
      line-height: 1.2
    }

    .divider {
      width: 2.5rem;
      height: 3px;
      background: var(--green);
      border-radius: 99px;
      margin-bottom: 2.25rem
    }

    /* ── NEWS ── */
    .news-sec {
      position: relative;
      overflow: hidden
    }

    .news-bg-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0
    }

    .news-bg-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(4, 10, 20, .94) 0%, rgba(10, 24, 42, .91) 60%, rgba(4, 10, 20, .89) 100%);
      z-index: 1
    }

    .news-rel {
      position: relative;
      z-index: 2
    }

    .news-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 360px;
      gap: 1.25rem;
      align-items: start
    }

    .news-card {
      background: rgba(255, 255, 255, .045);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--rad);
      padding: clamp(1.5rem, 2.5vw, 2.25rem);
      transition: all .3s;
      height: 100%
    }

    .news-card:hover {
      background: rgba(255, 255, 255, .065);
      border-color: rgba(16, 185, 129, .22);
      transform: translateY(-3px)
    }

    .news-date {
      font-size: var(--xs);
      color: var(--green);
      font-weight: 600;
      margin-bottom: .5rem
    }

    .news-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--lg);
      font-weight: 600;
      color: #fff;
      margin-bottom: .875rem;
      line-height: 1.45
    }

    .news-body {
      font-size: var(--sm);
      color: rgba(255, 255, 255, .52);
      line-height: 1.9;
      margin-bottom: .8rem
    }

    .nlink {
      color: var(--green);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 500;
      transition: color .2s
    }

    .nlink:hover {
      color: #34d399
    }

    /* ── NEWSLETTER ── */
    .nl-card {
      background: linear-gradient(160deg, rgba(16, 185, 129, .12), rgba(16, 185, 129, .04));
      border: 1px solid rgba(16, 185, 129, .18);
      border-radius: calc(var(--rad)*1.1);
      padding: clamp(1.5rem, 2.5vw, 2.25rem);
      position: relative;
      overflow: hidden
    }

    .nl-card::after {
      content: '';
      position: absolute;
      top: -70px;
      right: -70px;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: rgba(16, 185, 129, .07);
      pointer-events: none
    }

    .nl-img-ph {
      width: 100%;
      height: 114px;
      border-radius: .7rem;
      background: rgba(255, 255, 255, .05);
      border: 1.5px dashed rgba(255, 255, 255, .13);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      margin-bottom: 1.375rem;
      font-size: var(--xs);
      color: rgba(255, 255, 255, .28)
    }

    .nl-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      font-weight: 700;
      color: #fff;
      margin-bottom: .35rem
    }

    .nl-sub {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .44);
      margin-bottom: 1.2rem;
      line-height: 1.8
    }

    .nl-inp {
      width: 100%;
      background: rgba(255, 255, 255, .065);
      border: 1.5px solid rgba(255, 255, 255, .1);
      border-radius: .55rem;
      padding: .62rem .9rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--sm);
      margin-bottom: .6rem;
      outline: none;
      transition: border-color .25s
    }

    .nl-inp:focus {
      border-color: var(--green)
    }

    .nl-inp::placeholder {
      color: rgba(255, 255, 255, .28)
    }

    .nl-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: .55rem;
      padding: .72rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: var(--sm);
      cursor: pointer;
      transition: all .25s
    }

    .nl-btn:hover {
      background: var(--green-d);
      transform: translateY(-1px)
    }

    .nl-disc {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .27);
      text-align: center;
      margin-top: .6rem;
      line-height: 1.65
    }

    .nl-ok {
      text-align: center;
      padding: 2rem 0
    }

    .nl-ok i {
      font-size: 2.5rem;
      color: var(--green);
      display: block;
      margin-bottom: .75rem
    }

    .nl-ok-t {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      color: #fff;
      margin-bottom: .4rem
    }

    .nl-ok-b {
      font-size: var(--sm);
      color: rgba(255, 255, 255, .44)
    }

    /* ── ABOUT ── */
    .about-sec {
      position: relative;
      overflow: hidden
    }

    .about-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0
    }

    .about-ov {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: background .35s
    }

    .about-rel {
      position: relative;
      z-index: 2
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: start
    }

    .qblock {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-left: 4px solid var(--green);
      border-radius: var(--rad);
      padding: clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.2rem, 2.5vw, 1.75rem) clamp(1.4rem, 3vw, 2rem);
      margin-bottom: 1.2rem;
      box-shadow: var(--sh)
    }

    .qblock.purple {
      border-left-color: var(--purple)
    }

    .qt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: var(--base);
      color: var(--txt2);
      line-height: 1.9;
      margin-bottom: .8rem
    }

    .qa {
      font-weight: 700;
      color: var(--txt);
      font-size: var(--sm)
    }

    .qr {
      font-size: var(--xs);
      color: var(--txt3);
      margin-top: .12rem
    }

    .about-vis {
      background: linear-gradient(145deg, rgba(11, 25, 41, .98), rgba(22, 45, 74, .96));
      border-radius: var(--rad);
      overflow: hidden
    }

    .mv-photo {
      width: 100%;
      height: clamp(200px, 26vw, 310px);
      object-fit: cover;
      object-position: top center;
      display: block
    }

    .about-vis-body {
      padding: clamp(1.4rem, 2.5vw, 2rem)
    }

    .std-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .875rem;
      margin-bottom: 1.25rem
    }

    .std-item {
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: .7rem;
      padding: .85rem .95rem;
      display: flex;
      align-items: center;
      gap: .55rem
    }

    .std-icon {
      width: 1.9rem;
      height: 1.9rem;
      border-radius: .4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .85rem
    }

    .std-lbl {
      font-size: var(--xs);
      font-weight: 500;
      color: rgba(255, 255, 255, .68);
      line-height: 1.3
    }

    .badges {
      display: flex;
      gap: 1.75rem;
      border-top: 1px solid rgba(255, 255, 255, .07);
      padding-top: 1.1rem
    }

    .badge-n {
      font-family: 'Playfair Display', serif;
      font-size: var(--xl);
      font-weight: 700;
      color: var(--green);
      line-height: 1
    }

    .badge-l {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .37);
      margin-top: .12rem
    }

    /* ── AREAS ── */
    .areas-sec {
      background: var(--bg2)
    }

    .areas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem
    }

    .areas-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr)
    }

    .area-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--rad);
      overflow: hidden;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      flex-direction: column;
      box-shadow: var(--sh)
    }

    .area-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shl)
    }

    .area-card:hover .ac-arr {
      transform: translateX(5px)
    }

    .ac-bar {
      height: 4px;
      flex-shrink: 0
    }

    .ac-img {
      width: 100%;
      height: clamp(120px, 16vw, 180px);
      object-fit: cover;
      display: block;
      background: var(--bg3)
    }

    .ac-body {
      padding: clamp(1.1rem, 2vw, 1.6rem);
      flex: 1;
      display: flex;
      flex-direction: column
    }

    .ac-icon {
      width: clamp(2.25rem, 3.5vw, 3rem);
      height: clamp(2.25rem, 3.5vw, 3rem);
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .875rem;
      font-size: clamp(.875rem, 1.6vw, 1.125rem);
      flex-shrink: 0
    }

    .ac-name {
      font-family: 'Playfair Display', serif;
      font-size: var(--lg);
      font-weight: 700;
      margin-bottom: .5rem;
      color: var(--txt);
      line-height: 1.3
    }

    .ac-desc {
      font-size: var(--xs);
      color: var(--txt2);
      line-height: 1.85;
      flex: 1;
      margin-bottom: 1.1rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .ac-cta {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: var(--sm);
      font-weight: 700;
      transition: gap .25s
    }

    .area-card:hover .ac-cta {
      gap: .65rem
    }

    .ac-arr {
      transition: transform .25s
    }

    /* ── MODAL ── */
    .moverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .78);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto
    }

    .mbox {
      background: var(--bg);
      border-radius: calc(var(--rad)*1.5);
      max-width: min(960px, 96vw);
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .55)
    }

    .mhead {
      padding: clamp(1.375rem, 3vw, 2.1rem) clamp(1.375rem, 3vw, 2.1rem) clamp(1.1rem, 2.5vw, 1.75rem);
      border-bottom: 1px solid var(--bdr);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10
    }

    .mhead-lbl {
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: .35rem
    }

    .mtitle {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: var(--txt)
    }

    .mclose {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      border: 1.5px solid var(--bdr);
      background: var(--surf);
      color: var(--txt2);
      font-size: .9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s
    }

    .mclose:hover {
      background: var(--txt);
      color: var(--bg);
      border-color: var(--txt)
    }

    .mbody {
      padding: clamp(1.375rem, 3vw, 2.1rem)
    }

    .svc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
      margin-bottom: 1.625rem
    }

    .svc-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--rads);
      overflow: hidden
    }

    .svc-img {
      width: 100%;
      height: clamp(115px, 14vw, 155px);
      object-fit: cover;
      display: block
    }

    .svc-img-ph {
      width: 100%;
      height: clamp(115px, 14vw, 155px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      font-size: 1.6rem;
      background: var(--bg2)
    }

    .svc-body {
      padding: 1.05rem
    }

    .svc-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--base);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .6rem;
      line-height: 1.4
    }

    .svc-item {
      display: flex;
      gap: .35rem;
      align-items: flex-start;
      font-size: var(--xs);
      color: var(--txt2);
      line-height: 1.7;
      margin-bottom: .38rem
    }

    .svc-item::before {
      content: '—';
      color: var(--txt3);
      flex-shrink: 0
    }

    .mtest {
      border: 1px solid var(--bdr);
      border-left: 4px solid;
      border-radius: var(--rads);
      padding: clamp(1.1rem, 2.5vw, 1.5rem);
      background: var(--surf2)
    }

    .mtest-lbl {
      font-size: var(--xs);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: .6rem
    }

    .mtest-txt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: var(--sm);
      color: var(--txt2);
      line-height: 1.9;
      margin-bottom: .55rem
    }

    .mtest-auth {
      font-size: var(--xs);
      color: var(--txt3);
      font-weight: 500
    }

    /* ── RESEARCH ── */
    .research-sec {
      background: #07111E;
      background-image: radial-gradient(ellipse 55% 50% at 8% 82%, rgba(139, 92, 246, .07), transparent 60%)
    }

    .res-card {
      background: rgba(255, 255, 255, .035);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: var(--rad);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 290px
    }

    .res-body {
      padding: clamp(1.75rem, 4vw, 2.75rem)
    }

    .res-date {
      font-size: var(--xs);
      color: #a78bfa;
      font-weight: 600;
      margin-bottom: .5rem
    }

    .res-hl {
      font-family: 'Playfair Display', serif;
      font-size: var(--2xl);
      font-weight: 700;
      color: #fff;
      margin-bottom: .5rem;
      line-height: 1.4
    }

    .res-auth {
      font-style: italic;
      font-size: var(--sm);
      color: rgba(255, 255, 255, .4);
      margin-bottom: 1.4rem
    }

    .res-txt {
      font-size: var(--sm);
      color: rgba(255, 255, 255, .52);
      line-height: 1.9;
      margin-bottom: .75rem
    }

    .res-img-col {
      overflow: hidden
    }

    .res-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    /* ── CONTACT ── */
    .contact-sec {
      background: var(--bg)
    }

    .contact-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: calc(var(--rad)*1.5);
      padding: clamp(2.5rem, 6vw, 5rem) clamp(1.5rem, 5vw, 4rem);
      text-align: center;
      box-shadow: var(--sh)
    }

    .ct-title {
      font-family: 'Playfair Display', serif;
      font-size: var(--4xl);
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .875rem
    }

    .ct-sub {
      font-size: var(--md);
      color: var(--txt2);
      max-width: 580px;
      margin: 0 auto 1.1rem;
      line-height: 1.85
    }

    .ct-body {
      font-size: var(--sm);
      color: var(--txt3);
      max-width: 460px;
      margin: 0 auto 2.1rem
    }

    .ct-btns {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      justify-content: center;
      margin-bottom: 2.625rem
    }

    .soc-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(1rem, 3vw, 1.875rem);
      padding-top: 1.875rem;
      border-top: 1px solid var(--bdr)
    }

    .soc-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .38rem;
      text-decoration: none;
      color: var(--txt2);
      transition: color .25s, transform .25s;
      font-size: var(--xs)
    }

    .soc-item:hover {
      color: var(--green);
      transform: translateY(-4px)
    }

    .soc-icon {
      width: clamp(2.4rem, 4vw, 2.9rem);
      height: clamp(2.4rem, 4vw, 2.9rem);
      border-radius: .75rem;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(.95rem, 1.7vw, 1.15rem);
      transition: all .25s
    }

    .soc-item:hover .soc-icon {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .4);
      color: var(--green)
    }

    /* ── FOOTER ── */
    footer {
      background: #050D16;
      padding: clamp(1.1rem, 2.5vw, 1.75rem) clamp(1.25rem, 5vw, 4rem)
    }

    .ft-inner {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem
    }

    .ft-logo {
      height: 26px;
      width: auto;
      object-fit: contain;
      opacity: .52
    }

    .ft-tag {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .3);
      letter-spacing: .04em
    }

    .ft-rights {
      font-size: var(--xs);
      color: rgba(255, 255, 255, .2)
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .au1 {
      animation: fadeUp .7s .05s both
    }

    .au2 {
      animation: fadeUp .7s .15s both
    }

    .au3 {
      animation: fadeUp .7s .25s both
    }

    .au4 {
      animation: fadeUp .7s .35s both
    }

    .au5 {
      animation: fadeUp .7s .45s both
    }

    /* ── RESPONSIVE ── */
    @media(max-width:1099px) {
      .news-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto
      }

      .news-grid>:nth-child(3) {
        grid-column: 1/-1
      }

      .areas-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .areas-grid.cols-3 {
        grid-template-columns: repeat(2, 1fr)
      }

      .svc-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .res-card {
        grid-template-columns: 1fr 220px
      }

      .about-grid {
        grid-template-columns: 1fr !important;
        gap: 2rem !important
      }

      .about-vis {
        max-width: 580px
      }
    }

    @media(max-width:767px) {
      .news-grid {
        grid-template-columns: 1fr
      }

      .news-grid>:nth-child(3) {
        grid-column: unset
      }

      .areas-grid,
      .areas-grid.cols-3 {
        grid-template-columns: 1fr
      }

      .svc-grid {
        grid-template-columns: 1fr
      }

      .res-card {
        grid-template-columns: 1fr
      }

      .res-img-col {
        display: none
      }

      .contact-card {
        padding: 2rem 1.25rem
      }

      .mhead {
        padding: 1.1rem
      }

      .mbody {
        padding: 1.1rem
      }

      .ct-btns {
        flex-direction: column;
        align-items: center
      }

      .ct-btns .btn {
        width: 100%;
        max-width: 320px;
        justify-content: center
      }

      .hero-stats {
        gap: 1.5rem
      }
    }

    @media(max-width:480px) {
      .std-grid {
        grid-template-columns: 1fr 1fr
      }

      .badges {
        gap: 1.25rem
      }

      .soc-row {
        gap: .875rem
      }
    }
  </style>
</head>

<body>

  <!-- ══ NAVBAR ══ -->
  <nav class="navbar" :class="scrollY>60?'is-scrolled':'is-top'">
    <div class="nav-inner">

      <!-- Logo: x-show does clean display:none swap — no absolute stacking -->
      <div class="nav-logo" @click="scrollTo('home')">
        <img src="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" alt="ESG e Tal"
          x-show="darkMode || scrollY <= 60">
        <img src="https://esgetal.com.br/engl/images/e8f5f57216f727d0ee0df67b8110f48c.png" alt="ESG e Tal"
          x-show="!darkMode && scrollY > 60">
      </div>

      <!-- Desktop links -->
      <nav class="nav-links">
        <template x-for="item in ['home','news','about','areas','research','contact']" :key="item">
          <span class="nav-lnk" :class="{active:activeSection===item}" @click="scrollTo(item)"
            x-text="t('nav.'+item)"></span>
        </template>
      </nav>

      <!-- Controls -->
      <div class="nav-ctrl">
        <button class="tbtn" @click="toggleLang()">
          <span x-show="lang==='pt'">🇧🇷</span><span x-show="lang==='pt'"
            style="font-size:.68rem;font-weight:600">PT</span>
          <span x-show="lang==='en'">🇺🇸</span><span x-show="lang==='en'"
            style="font-size:.68rem;font-weight:600">EN</span>
        </button>
        <button class="tbtn" @click="toggleDark()">
          <i :class="darkMode?'fa-solid fa-sun':'fa-solid fa-moon'" style="font-size:.8rem"></i>
        </button>
        <button class="tbtn nav-burger" @click="mobileMenuOpen=true">
          <i class="fa-solid fa-bars" style="font-size:.85rem"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile overlay -->
  <div class="mm-ov" x-show="mobileMenuOpen" x-cloak @click="mobileMenuOpen=false"
    x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>

  <!-- Mobile panel -->
  <div class="mm-panel" x-show="mobileMenuOpen" x-cloak x-transition:enter="transition ease-out duration-250"
    x-transition:enter-start="opacity-0 translate-x-8" x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-180" x-transition:leave-start="opacity-100 translate-x-0"
    x-transition:leave-end="opacity-0 translate-x-8">
    <div class="mm-head">
      <img
        :src="darkMode?'https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png':'https://esgetal.com.br/engl/images/e8f5f57216f727d0ee0df67b8110f48c.png'"
        alt="ESG e Tal" style="height:30px;width:auto;object-fit:contain">
      <button class="tbtn" @click="mobileMenuOpen=false"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <template x-for="item in ['home','news','about','areas','research','contact']" :key="item">
      <span class="mm-lnk" :class="{active:activeSection===item}" @click="scrollTo(item)"
        x-text="t('nav.'+item)"></span>
    </template>
    <div class="mm-foot">
      <button class="tbtn" style="flex:1;justify-content:center" @click="toggleLang()">
        <span x-text="lang==='pt'?'🇧🇷 PT-BR':'🇺🇸 EN'"></span>
      </button>
      <button class="tbtn" style="flex:1;justify-content:center" @click="toggleDark()">
        <i :class="darkMode?'fa-solid fa-sun':'fa-solid fa-moon'"></i>
        <span x-text="darkMode?(lang==='pt'?'Claro':'Light'):(lang==='pt'?'Escuro':'Dark')"></span>
      </button>
    </div>
  </div>


  <!-- ══ HERO ══ -->
  <section id="home" class="hero"
    style="background-image:url('https://esgetal.com.br/_assets/media/6bfd004501232b8760269d32e0ca4866.jpg');background-position:top center">
    <div class="hero-ov"></div>
    <div class="hero-grid"></div>
    <div class="hero-glow"></div>
    <div class="hero-cnt">
      <!-- ONE logo in hero, always white -->
      <img src="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" alt="ESG e Tal Consultancy"
        class="hero-logo au1">
      <h1 class="hero-hl au2">
        <span class="ac" x-text="t('hero.tag1')"></span><br>
        <span x-text="t('hero.tag2')"></span><br>
        <span x-text="t('hero.tag3')"></span>
      </h1>
      <p class="hero-sub au3" x-text="t('hero.subtitle')"></p>
      <div class="hero-actions au4">
        <button class="btn btn-g" @click="scrollTo('contact')"><i class="fa-solid fa-arrow-right"></i><span
            x-text="t('hero.cta')"></span></button>
        <button class="btn btn-w" @click="scrollTo('areas')"><span x-text="t('hero.ctaSub')"></span><i
            class="fa-solid fa-chevron-down"></i></button>
      </div>
      <div class="hero-stats au5">
        <template x-for="stat in heroStats" :key="stat.value">
          <div>
            <div class="stat-n" x-text="stat.value"></div>
            <div class="stat-l" x-text="heroStatLabel(stat)"></div>
          </div>
        </template>
      </div>
    </div>
    <div class="scroll-cue" @click="scrollTo('news')">
      <div style="width:1px;height:30px;background:linear-gradient(to bottom,rgba(16,185,129,.7),transparent)"></div>
      <i class="fa-solid fa-chevron-down" style="color:rgba(255,255,255,.35);font-size:.62rem"></i>
    </div>
  </section>


  <!-- ══ NEWS ══ -->
  <section id="news" class="news-sec">
    <div class="news-bg-img"
      style="background-image:url('https://esgetal.com.br/_assets/media/bf894d56cafa5a70daf05270ca7ae594.jpg')"></div>
    <div class="news-bg-ov"></div>
    <div class="news-rel wrap">
      <span class="sec-lbl" x-text="t('news.title')"></span>
      <h2 class="sec-h" style="color:#fff" x-text="t('news.title')"></h2>
      <div class="divider"></div>
      <div class="news-grid">
        <!-- Card 1 -->
        <div class="news-card">
          <div class="news-date"><i class="fa-regular fa-calendar" style="margin-right:.35rem"></i><span
              x-text="t('news.item1.date')"></span></div>
          <h3 class="news-hl" x-text="t('news.item1.headline')"></h3>
          <p class="news-body"><a class="nlink" href="https://esgetal.com.br" target="_blank" rel="noopener"
              x-text="t('news.item1.link')"></a> (<a class="nlink" href="https://amazon.com.br" target="_blank"
              rel="noopener" x-text="t('news.item1.linkAlt')"></a>). <span x-text="t('news.item1.body')"></span></p>
          <p class="news-body" x-text="t('news.item1.body2')"></p>
          <div style="margin-top:1rem"><a href="https://esgetal.com.br" target="_blank" rel="noopener"
              style="display:inline-block;opacity:.88;transition:opacity .2s" onmouseover="this.style.opacity='.6'"
              onmouseout="this.style.opacity='.88'"><img
                src="https://esgetal.com.br/engl/images/c48aec61ba040135cb9186dfbe2a4429.png" alt="Adquirir"
                style="height:38px;width:auto;object-fit:contain;border-radius:.35rem"></a></div>
        </div>
        <!-- Card 2 -->
        <div class="news-card">
          <div class="news-date"><i class="fa-regular fa-calendar" style="margin-right:.35rem"></i><span
              x-text="t('news.item2.date')"></span></div>
          <div
            style="display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .6rem;border-radius:99px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.28);color:var(--gold);font-size:var(--xs);font-weight:600;margin-bottom:.65rem">
            <i class="fa-solid fa-award"></i><span x-text="lang==='pt'?'Prêmio':'Award'"></span>
          </div>
          <h3 class="news-hl" x-text="t('news.item2.headline')"></h3>
          <p class="news-body"><a class="nlink" href="https://esgetal.com.br" target="_blank" rel="noopener"
              x-text="t('news.item2.link')"></a> <span x-text="t('news.item2.body')"></span> <a class="nlink"
              href="https://esgetal.com.br" target="_blank" rel="noopener" x-text="t('news.item2.linkPDF')"></a>.</p>
        </div>
        <!-- Newsletter -->
        <div class="nl-card">
          <div class="nl-img-ph"><i class="fa-regular fa-image" style="font-size:1.35rem"></i><span
              x-text="lang==='pt'?'Imagem da newsletter':'Newsletter image'"></span></div>
          <div x-show="!newsletterSent">
            <h3 class="nl-title" x-text="t('news.nl.title')"></h3>
            <p class="nl-sub" x-text="t('news.nl.subtitle')"></p>
            <input class="nl-inp" type="text" :placeholder="t('news.nl.namePh')" x-model="newsletterName"
              autocomplete="name">
            <input class="nl-inp" type="email" :placeholder="t('news.nl.emailPh')" x-model="newsletterEmail"
              @keydown.enter="submitNewsletter()" autocomplete="email">
            <button class="nl-btn" @click="submitNewsletter()"><i class="fa-solid fa-paper-plane"
                style="margin-right:.4rem"></i><span x-text="t('news.nl.btn')"></span></button>
            <p class="nl-disc" x-text="t('news.nl.disclaimer')"></p>
          </div>
          <div class="nl-ok" x-show="newsletterSent">
            <i class="fa-solid fa-circle-check"></i>
            <div class="nl-ok-t" x-text="lang==='pt'?'Inscrição realizada!':\" You're subscribed!\""></div>
            <div class="nl-ok-b" x-text="lang==='pt'?'Obrigado! Em breve você receberá nossas novidades.':\" Thank you!
              You'll hear from us soon.\""></div>
          </div>
        </div>
      </div>

      <!-- ── Notícias extras (Admin CMS) ── -->
      <template x-if="dynamicNewsItems && dynamicNewsItems.length > 0">
        <div
          style="margin-top:1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:1.25rem">
          <template x-for="item in dynamicNewsItems" :key="item.id">
            <div class="news-card">
              <div class="news-date">
                <i class="fa-regular fa-calendar" style="margin-right:.35rem"></i>
                <span x-text="(lang==='en'&&item.date&&item.date.en)?item.date.en:(item.date&&item.date.pt)||''"></span>
              </div>
              <h3 class="news-hl"
                x-text="(lang==='en'&&item.headline&&item.headline.en)?item.headline.en:(item.headline&&item.headline.pt)||''">
              </h3>
              <p class="news-body"
                x-text="(lang==='en'&&item.body&&item.body.en)?item.body.en:(item.body&&item.body.pt)||''"></p>
              <template x-if="item.linkUrl">
                <a class="nlink" :href="item.linkUrl" target="_blank" rel="noopener"
                  x-text="(lang==='en'&&item.linkText&&item.linkText.en)?item.linkText.en:(item.linkText&&item.linkText.pt)||'Saiba mais'"></a>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </section>


  <!-- ══ ABOUT ══ -->
  <section id="about" class="about-sec">
    <div class="about-bg"
      style="background-image:url('https://esgetal.com.br/_assets/media/6bfd004501232b8760269d32e0ca4866.jpg')"></div>
    <div class="about-ov"
      :style="darkMode?'background:linear-gradient(135deg,rgba(8,17,28,.97),rgba(12,24,37,.95))':'background:linear-gradient(135deg,rgba(250,250,248,.97),rgba(242,239,233,.95))'">
    </div>
    <div class="about-rel wrap">
      <div class="about-grid">
        <div>
          <span class="sec-lbl" x-text="t('about.title')"></span>
          <h2 class="sec-h" x-text="t('about.subtitle')"></h2>
          <div class="divider"></div>
          <div class="qblock">
            <p class="qt" x-text="t('about.quote')"></p>
            <div class="qa" x-text="t('about.quoteAuthor')"></div>
            <div class="qr" x-text="t('about.quoteRole')"></div>
          </div>
          <div class="qblock purple">
            <p class="qt" x-text="t('about.testimonial')"></p>
            <div class="qa" x-text="t('about.testimonialAuthor')"></div>
            <div class="qr" x-text="t('about.testimonialRole')"></div>
          </div>
        </div>
        <div class="about-vis">
          <img src="https://esgetal.com.br/_assets/media/3f0ca78b384138cff28ce21ca9017b86.jpg"
            alt="Marcus Vinicius Peixoto da Silva com equipe" class="mv-photo">
          <div class="about-vis-body">
            <div
              style="font-size:var(--xs);font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:.8rem"
              x-text="lang==='pt'?'Quatro pilares de atuação':'Four pillars of action'"></div>
            <div class="std-grid">
              <template
                x-for="(it,i) in [{icon:'fa-leaf',label:lang==='pt'?'Meio Ambiente':'Environment',c:'#10B981'},{icon:'fa-people-group',label:lang==='pt'?'Resp. Social':'Social Resp.',c:'#F59E0B'},{icon:'fa-scale-balanced',label:lang==='pt'?'Governança':'Governance',c:'#3B82F6'},{icon:'fa-bullhorn',label:lang==='pt'?'Comunicação':'Communication',c:'#8B5CF6'}]"
                :key="i">
                <div class="std-item">
                  <div class="std-icon" :style="'background:'+it.c+'1A;color:'+it.c"><i
                      :class="'fa-solid '+it.icon"></i></div><span class="std-lbl" x-text="it.label"></span>
                </div>
              </template>
            </div>
            <div class="badges">
              <div>
                <div class="badge-n">GRI</div>
                <div class="badge-l">Standard</div>
              </div>
              <div>
                <div class="badge-n">IFRS</div>
                <div class="badge-l">S1 &amp; S2</div>
              </div>
              <div>
                <div class="badge-n">ABNT</div>
                <div class="badge-l">PR 2030</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>


  <!-- ══ AREAS ══ -->
  <section id="areas" class="areas-sec">
    <div class="wrap">
      <div style="text-align:center;margin-bottom:clamp(2rem,4vw,3.25rem)">
        <span class="sec-lbl" x-text="t('areas.title')"></span>
        <h2 class="sec-h" x-text="t('areas.title')"></h2>
        <div class="divider" style="margin:1rem auto 0"></div>
      </div>
      <div class="areas-grid" :class="lang==='en'?'cols-3':''">
        <template x-for="area in areas" :key="area.key">
          <div class="area-card" @click="openModal(area.key)">
            <div class="ac-bar" :style="'background:'+area.color"></div>
            <img :src="area.img" :alt="area.name" class="ac-img" loading="lazy">
            <div class="ac-body">
              <div class="ac-icon" :style="'background:'+area.colorSoft+';color:'+area.color"><i
                  :class="'fa-solid '+area.icon"></i></div>
              <h3 class="ac-name" x-text="area.name"></h3>
              <p class="ac-desc" x-text="area.desc"></p>
              <div class="ac-cta" :style="'color:'+area.color"><span x-text="t('areas.learnMore')"></span><i
                  class="fa-solid fa-arrow-right ac-arr"></i></div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- Area modal -->
  <template x-teleport="body">
    <div class="moverlay" x-show="activeModal && activeArea" x-cloak @click.self="closeModal()"
      x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
      <div class="mbox" @click.stop>
        <template x-if="activeArea">
          <div>
            <div class="mhead" :style="'border-left:4px solid '+activeArea.color">
              <div>
                <div class="mhead-lbl" :style="'color:'+activeArea.color"><i :class="'fa-solid '+activeArea.icon"
                    style="margin-right:.35rem"></i>ESG e Tal</div>
                <h2 class="mtitle" x-text="activeArea.name"></h2>
              </div>
              <button class="mclose" @click="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="mbody">
              <div class="svc-grid">
                <template x-for="(st,si) in activeArea.subtopics" :key="si">
                  <div class="svc-card">
                    <template x-if="st.img"><img :src="st.img" :alt="st.title" class="svc-img"
                        loading="lazy"></template>
                    <template x-if="!st.img">
                      <div class="svc-img-ph" :style="'background:'+activeArea.color+'14'"><i
                          :class="'fa-solid '+activeArea.icon"
                          :style="'color:'+activeArea.color+';font-size:1.6rem'"></i><span
                          style="font-size:var(--xs);color:var(--txt3)"
                          x-text="lang==='pt'?'Imagem em breve':'Coming soon'"></span></div>
                    </template>
                    <div class="svc-body">
                      <h4 class="svc-title" x-text="st.title"></h4>
                      <template x-for="(item,ii) in st.items" :key="ii">
                        <div class="svc-item" x-text="item"></div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
              <div class="mtest" :style="'border-left-color:'+activeArea.color">
                <div class="mtest-lbl" :style="'color:'+activeArea.color"><i class="fa-solid fa-quote-left"
                    style="margin-right:.35rem"></i><span x-text="t('modal.testimonialLabel')"></span></div>
                <p class="mtest-txt" x-text="activeArea.testimonial"></p>
                <div class="mtest-auth" x-text="activeArea.testimonialAuthor"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>


  <!-- ══ RESEARCH ══ -->
  <section id="research" class="research-sec">
    <div class="wrap">
      <span class="sec-lbl" style="color:#a78bfa" x-text="t('research.title')"></span>
      <h2 class="sec-h" style="color:#fff" x-text="t('research.title')"></h2>
      <div class="divider" style="background:var(--purple)"></div>
      <div class="res-card">
        <div class="res-body">
          <div class="res-date"><i class="fa-regular fa-calendar" style="margin-right:.35rem"></i><span
              x-text="t('research.item1.date')"></span></div>
          <h3 class="res-hl" x-text="t('research.item1.headline')"></h3>
          <p class="res-auth" x-text="t('research.item1.author')"></p>
          <a href="https://docs.google.com/forms/d/16YldwC9CDqSbX7rS9Wfwnk53Ekpcuga0AmE-UX3EhKQ/viewform"
            target="_blank" rel="noopener" class="btn btn-purple" style="margin-bottom:1.625rem;display:inline-flex"><i
              class="fa-solid fa-file-lines"></i><span x-text="t('research.item1.cta')"></span></a>
          <p class="res-txt" x-text="t('research.item1.body1')"></p>
          <p class="res-txt" x-text="t('research.item1.body2')"></p>
          <p class="res-txt" x-text="t('research.item1.body3')"></p>
        </div>
        <div class="res-img-col"><img src="https://esgetal.com.br/_assets/media/9fc7ceb1990dd3185b72598a54da4d5a.jpg"
            alt="Pesquisa ESG e Tal" class="res-img" loading="lazy"></div>
      </div>

      <!-- ── Artigos extras (Admin CMS) ── -->
      <template x-if="dynamicResearchItems && dynamicResearchItems.length > 0">
        <div style="margin-top:1.5rem;display:flex;flex-direction:column;gap:1.25rem">
          <template x-for="item in dynamicResearchItems" :key="item.id">
            <div class="res-card" style="grid-template-columns:1fr">
              <div class="res-body">
                <div class="res-date">
                  <i class="fa-regular fa-calendar" style="margin-right:.35rem"></i>
                  <span
                    x-text="(lang==='en'&&item.date&&item.date.en)?item.date.en:(item.date&&item.date.pt)||''"></span>
                </div>
                <h3 class="res-hl"
                  x-text="(lang==='en'&&item.headline&&item.headline.en)?item.headline.en:(item.headline&&item.headline.pt)||''">
                </h3>
                <p class="res-auth"
                  x-text="(lang==='en'&&item.author&&item.author.en)?item.author.en:(item.author&&item.author.pt)||''">
                </p>
                <template x-if="item.ctaUrl">
                  <a :href="item.ctaUrl" target="_blank" rel="noopener" class="btn btn-purple"
                    style="margin-bottom:1.25rem;display:inline-flex">
                    <i class="fa-solid fa-file-lines"></i>
                    <span
                      x-text="(lang==='en'&&item.ctaText&&item.ctaText.en)?item.ctaText.en:(item.ctaText&&item.ctaText.pt)||'Acessar'"></span>
                  </a>
                </template>
                <p class="res-txt"
                  x-text="(lang==='en'&&item.body&&item.body.en)?item.body.en:(item.body&&item.body.pt)||''"></p>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </section>


  <!-- ══ CONTACT ══ -->
  <section id="contact" class="contact-sec">
    <div class="wrap">
      <div class="contact-card">
        <div
          style="display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .8rem;border-radius:99px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.16);color:var(--green);font-size:var(--xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.25rem">
          <i class="fa-solid fa-envelope"></i><span x-text="lang==='pt'?'Contatos':'Contact'"></span>
        </div>
        <h2 class="ct-title" x-text="t('contact.title')"></h2>
        <p class="ct-sub" x-text="t('contact.subtitle')"></p>
        <p class="ct-body" x-text="t('contact.body')"></p>
        <div class="ct-btns">
          <a href="https://wa.me/5511987308730" target="_blank" rel="noopener" class="btn btn-g"><i
              class="fa-brands fa-whatsapp"></i><span x-text="t('contact.cta1')"></span></a>
          <a href="https://wa.me/5511987308730" target="_blank" rel="noopener" class="btn btn-ghost"><i
              class="fa-solid fa-comments"></i><span x-text="t('contact.cta2')"></span></a>
        </div>
        <div class="soc-row">
          <a href="https://wa.me/5511987308730" target="_blank" rel="noopener" class="soc-item">
            <div class="soc-icon"><i class="fa-brands fa-whatsapp"></i></div><span>+55 (11) 98730 8730</span>
          </a>
          <a href="https://www.linkedin.com/company/esgetal/" target="_blank" rel="noopener" class="soc-item">
            <div class="soc-icon"><i class="fa-brands fa-linkedin-in"></i></div><span>esgetal</span>
          </a>
          <a href="https://www.instagram.com/grupoesgetal/" target="_blank" rel="noopener" class="soc-item">
            <div class="soc-icon"><i class="fa-brands fa-instagram"></i></div><span>@grupoesgetal</span>
          </a>
          <a href="https://www.facebook.com/esgetal/" target="_blank" rel="noopener" class="soc-item">
            <div class="soc-icon"><i class="fa-brands fa-facebook-f"></i></div><span>esgetal</span>
          </a>
          <a href="https://esgetal.com.br" target="_blank" rel="noopener" class="soc-item">
            <div class="soc-icon"><i class="fa-solid fa-globe"></i></div><span>esgetal.com.br</span>
          </a>
        </div>
      </div>
    </div>
  </section>


  <!-- ══ FOOTER ══ -->
  <footer>
    <div class="ft-inner">
      <div style="display:flex;align-items:center;gap:.875rem">
        <img src="https://esgetal.com.br/engl/images/462a6d7c25d0823103237f7631462c3a.png" alt="ESG e Tal"
          class="ft-logo">
        <div class="ft-tag" x-text="t('footer.tagline')"></div>
      </div>
      <div class="ft-rights" x-text="t('footer.rights')"></div>
    </div>
  </footer>

</body>

</html>
