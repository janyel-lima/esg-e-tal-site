name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # dispara no push para a branch main
  workflow_dispatch:  # permite disparo manual pela interface do GitHub

permissions:
  contents: read
  pages:    write
  id-token: write

# Evita deploys simultâneos; o mais recente cancela o anterior
concurrency:
  group:   "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🔧  Setup Pages
        uses: actions/configure-pages@v5

      # Cria o arquivo de config usando os Secrets do repositório
      - name: 📝 Create Firebase Config
        run: |
          echo "const firebaseConfig = {
            apiKey: \"${{ secrets.FIREBASE_API_KEY }}\",
            authDomain: \"${{ secrets.FIREBASE_AUTH_DOMAIN }}\",
            databaseURL: \"${{ secrets.FIREBASE_DATABASE_URL }}\",
            projectId: \"${{ secrets.FIREBASE_PROJECT_ID }}\",
            storageBucket: \"${{ secrets.FIREBASE_STORAGE_BUCKET }}\",
            messagingSenderId: \"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}\",
            appId: \"${{ secrets.FIREBASE_APP_ID }}\",
            measurementId: \"${{ secrets.FIREBASE_MEASUREMENT_ID }}\"
          };" > firebase-config.js

      - name: 📦  Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 🚀  Deploy
        id:   deployment
        uses: actions/deploy-pages@v4
        